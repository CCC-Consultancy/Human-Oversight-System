<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Human Oversight System | CCC Consultancy Group</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --bg:#f5f6f9;--surface:#fff;--text:#0f172a;--muted:#6b7280;--border:#e5e7eb;
  --primary:hsl(218.18deg 38.06% 21.29%);--primary-hover:hsl(218.18deg 38.06% 29%);
  --turquoise:#1FBFD7;--tq-light:rgba(31,191,215,.1);
  --approve:#16A34A;--approve-bg:#DCFCE7;
  --flag:#D97706;--flag-bg:#FEF3C7;
  --reject:#DC2626;--reject-bg:#FEE2E2;
  --refer:#2563EB;--refer-bg:#DBEAFE;
  --override:#7C3AED;--override-bg:#EDE9FE;
  --escalate:#9F1239;--escalate-bg:#FFE4E6;
  --r:18px;--rsm:10px;
  --sh:0 8px 28px rgba(16,24,40,.08);--shsm:0 2px 10px rgba(16,24,40,.05);
  --tr:.2s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{margin:0;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;opacity:0;transition:opacity .4s ease}
body.loaded{opacity:1}
#root{display:flex;flex-direction:column;min-height:100vh}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseDot{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.fade-up{animation:fadeUp .3s ease both}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:7px}

/* ─── HEADER ─── */
.hdr{background:var(--primary);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;border-bottom:2px solid rgba(255,255,255,.06)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{width:36px;height:36px;background:var(--turquoise);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:var(--primary);flex-shrink:0}
.hdr-org{color:#fff;font-size:13px;font-weight:700}
.hdr-tag{color:rgba(255,255,255,.38);font-size:9px;text-transform:uppercase;letter-spacing:1.3px;margin-top:2px}
.hdr-div{width:1px;height:28px;background:rgba(255,255,255,.12)}
.hdr-tool{color:rgba(255,255,255,.9);font-size:13px;font-weight:600}
.hdr-abbr{color:var(--turquoise);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.hdr-actions{display:flex;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:var(--tr)}
.icon-btn:hover{background:rgba(31,191,215,.2);border-color:rgba(31,191,215,.4);color:var(--turquoise)}

/* ─── TABS ─── */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;overflow-x:auto}
.tab-btn{padding:15px 20px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border:none;border-bottom:3px solid transparent;background:none;transition:var(--tr);display:flex;align-items:center;gap:7px;white-space:nowrap;font-family:'Inter',sans-serif}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--turquoise)}
.tab-btn:hover:not(.active){color:var(--primary)}
.tab-count{background:var(--turquoise);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700}

/* ─── MAIN ─── */
.wrap{flex:1;padding:32px;max-width:960px;width:100%;margin:0 auto}

/* ─── CARD ─── */
.card{background:var(--surface);border-radius:var(--r);padding:28px;box-shadow:var(--sh);margin-bottom:18px}
.card-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.1px;color:var(--turquoise);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* ─── INPUT TYPE SELECTOR ─── */


/* ─── DISCLAIMER ─── */
.disclaimer{background:#F8FAFF;border:1px solid #C7D7F0;border-radius:10px;padding:11px 15px;margin-bottom:16px;font-size:11.5px;color:#374151;line-height:1.65;display:flex;gap:10px;align-items:flex-start}
.disclaimer span:first-child{flex-shrink:0;font-size:14px;margin-top:1px}

/* ─── STEPS ─── */
.steps{background:var(--surface);border-radius:var(--rsm);padding:14px 22px;margin-bottom:26px;box-shadow:var(--shsm);display:flex;align-items:center}
.sn{display:flex;align-items:center;gap:9px}
.sc{width:27px;height:27px;border-radius:50%;font-size:11px;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .3s}
.sc.p{background:var(--border);color:#9ca3af}.sc.a{background:var(--primary);color:#fff}.sc.d{background:var(--turquoise);color:#fff}
.sl{font-size:11.5px;font-weight:600;white-space:nowrap;transition:color .2s}
.sl.p{color:var(--muted)}.sl.a{color:var(--primary)}.sl.d{color:var(--turquoise)}
.sconn{flex:1;height:1.5px;background:var(--border);margin:0 8px;transition:background .3s}.sconn.d{background:var(--turquoise)}

/* ─── FIELDS ─── */
.fl{display:block;font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:13.5px;color:var(--text);background:var(--surface);outline:none;transition:border-color var(--tr);margin-bottom:18px}
.fi:focus{border-color:var(--turquoise)}
textarea.fi{resize:vertical;min-height:100px;line-height:1.7}

/* ─── BUTTONS ─── */
.btn{padding:11px 24px;border-radius:11px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr);border:none}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:var(--primary-hover)}.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-o{background:transparent;color:var(--primary);border:1.5px solid var(--border)}.btn-o:hover{border-color:var(--primary)}
.btn-t{background:var(--turquoise);color:#fff}.btn-t:hover{background:#18a8bd}.btn-t:disabled{opacity:.5;cursor:not-allowed}
.btn-e{background:var(--escalate);color:#fff}.btn-e:hover{background:#881337}
.btn-row{display:flex;gap:10px;align-items:center;margin-top:6px}

/* ─── OUTPUT ─── */
.dbadge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.otop{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.cfb{display:flex;align-items:center;gap:12px;flex:1;min-width:200px}
.cfn{font-size:26px;font-weight:800;line-height:1}
.cfm{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:4px}
.cfbar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.cffill{height:100%;border-radius:3px;background:linear-gradient(to right,var(--turquoise),var(--primary));transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.ai-h{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:8px;line-height:1.4}
.ai-r{font-size:13px;color:#444;line-height:1.75;margin-bottom:18px}
.ai-g{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ai-s{background:var(--bg);border-radius:10px;padding:14px}
.ai-sl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px}
.ai-s p{font-size:13px;line-height:1.65}
.tag{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11.5px;font-weight:500;margin:0 4px 4px 0;border:1px solid}
.tag-r{background:var(--flag-bg);border-color:#FCD34D;color:#92400E}
.tag-g{background:#F3F4F6;border-color:var(--border);color:#374151}
.tag-b{background:var(--refer-bg);border-color:#BFDBFE;color:#1E40AF}

/* ─── ENGINE NOTE ─── */
.eng-note{background:#F8F5FF;border:1px solid #DDD6FE;border-radius:10px;padding:13px 16px;margin-bottom:16px;font-size:12px;color:#4C1D95;line-height:1.65}

/* ─── LENSES ─── */
.lcard{background:var(--bg);border-radius:12px;padding:18px;margin-bottom:12px;border-left:3px solid transparent;transition:border-color .3s}
.lcard.rated{border-left-color:var(--turquoise)}
.lhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.lt{font-size:13.5px;font-weight:700;color:var(--primary);margin-bottom:3px}
.ld{font-size:11.5px;color:var(--muted);line-height:1.55}
.ls{font-size:11px;font-weight:700;min-width:90px;text-align:right}
.rrow{display:flex;gap:5px;margin-bottom:10px}
.rb{flex:1;padding:8px 4px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;text-align:center;transition:all .18s;font-family:'Inter',sans-serif}
.rb .rn{font-size:15px;font-weight:800;color:var(--muted);display:block}
.rb .rl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.2px;display:block;margin-top:1px;line-height:1.3}
.rb:hover:not(.sel){border-color:var(--turquoise)}
.rb.sel{border-color:var(--primary);background:var(--primary)}
.rb.sel .rn,.rb.sel .rl{color:#fff}
.score-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:10px;background:var(--bg);margin:16px 0 4px}
.sbig{font-size:34px;font-weight:800;color:var(--primary);line-height:1}
.sbarw{flex:1}.sbar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px}
.sfill{height:100%;border-radius:4px;transition:width .6s ease,background .3s}
.stxt{font-size:12px;font-weight:600}

/* ─── DECISION ─── */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.dopt{padding:16px;border:2px solid var(--border);border-radius:12px;cursor:pointer;background:var(--surface);transition:all .2s}
.dopt:hover{border-color:#9ca3af}.dopt.sel{border-color:var(--primary);background:var(--primary)}
.di{font-size:20px;display:block;margin-bottom:7px}
.dt{font-weight:700;font-size:13px;display:block;margin-bottom:4px;color:var(--primary)}
.dd{font-size:11.5px;line-height:1.45;color:var(--muted)}
.dopt.sel .dt{color:#fff}.dopt.sel .dd{color:rgba(255,255,255,.6)}

/* ─── OVERRIDE ─── */
.orbox{background:#F8F5FF;border:1.5px solid #DDD6FE;border-radius:12px;padding:18px;margin-bottom:14px}
.orlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--override);margin-bottom:12px}
.orgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.orch{padding:10px 12px;border:1.5px solid #DDD6FE;border-radius:8px;cursor:pointer;background:#fff;display:flex;align-items:flex-start;gap:9px;transition:all .18s}
.orch.sel{border-color:var(--override);background:var(--override-bg)}
.orchk{width:15px;height:15px;border-radius:3px;border:2px solid #DDD6FE;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:1px;transition:all .18s}
.orch.sel .orchk{background:var(--override);border-color:var(--override);color:#fff}
.orcn{font-size:12px;font-weight:700;color:var(--text)}.orcd{font-size:10px;color:var(--muted);margin-top:2px}

/* ─── ESCALATION BOX ─── */
.escbox{background:#FFF1F2;border:1.5px solid #FECDD3;border-radius:12px;padding:18px;margin-bottom:14px}
.esclbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--escalate);margin-bottom:14px}
.escgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.esc-preview{background:#fff;border:1px solid #FECDD3;border-radius:10px;padding:14px;margin-top:12px;font-size:12px;line-height:1.75;color:#374151;font-family:monospace;white-space:pre-wrap;max-height:220px;overflow-y:auto}
.esc-preview-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--escalate);margin-bottom:8px}

/* ─── SUGGEST ─── */
.sug{border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12.5px;border:1px solid}
.sug.good{background:#F0FDF4;border-color:#86EFAC;color:#14532D}
.sug.warn{background:#FFFBEB;border-color:#FCD34D;color:#78350F}
.sug.bad{background:#FFF1F2;border-color:#FECDD3;color:#881337}

/* ─── ALERTS ─── */
.alert{border-radius:10px;padding:13px 16px;margin-bottom:16px;display:flex;gap:10px;font-size:13px;line-height:1.6;border:1px solid}
.a-info{background:var(--tq-light);border-color:rgba(31,191,215,.3);color:var(--primary)}
.a-warn{background:var(--flag-bg);border-color:#FCD34D;color:#78350F}
.a-green{background:var(--approve-bg);border-color:#86EFAC;color:#14532D}

/* ─── PROGRESS SAVE BANNER ─── */
.resume-bar{background:var(--primary);color:#fff;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.resume-bar p{font-size:13px;font-weight:600}
.resume-bar span{font-size:12px;color:rgba(255,255,255,.65)}

/* ─── AUDIT ─── */
.aitem{background:var(--surface);border-radius:12px;padding:16px 18px;margin-bottom:10px;border-left:4px solid var(--border);box-shadow:var(--shsm);transition:box-shadow .2s}
.aitem:hover{box-shadow:var(--sh)}
.h-approve{border-left-color:var(--approve)}.h-cond{border-left-color:var(--flag)}.h-override{border-left-color:var(--override)}.h-escalate{border-left-color:var(--escalate)}
.ameta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.aid{font-size:11px;font-weight:700;color:var(--turquoise);font-family:monospace}
.atime{font-size:11px;color:var(--muted)}
.brow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.mb{padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600}
.mb-g{background:#F2F2F2;color:var(--text)}
.mb-approve{background:var(--approve-bg);color:var(--approve)}.mb-flag{background:var(--flag-bg);color:var(--flag)}
.mb-reject{background:var(--reject-bg);color:var(--reject)}.mb-refer{background:var(--refer-bg);color:var(--refer)}
.mb-ov{background:var(--override-bg);color:var(--override)}.mb-cond{background:#FEF9C3;color:#854D0E}.mb-esc{background:var(--escalate-bg);color:var(--escalate)}
.mb-ai{background:#F3F4F6;color:#374151}

/* ─── STATS ─── */
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stcard{background:var(--surface);border-radius:var(--rsm);padding:18px;box-shadow:var(--shsm);text-align:center}
.stnum{font-size:30px;font-weight:800;color:var(--primary);line-height:1;margin-bottom:4px}
.stlbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
.stsub{font-size:11px;color:var(--turquoise);font-weight:600;margin-top:5px}
.chartgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ccard{background:var(--surface);border-radius:var(--rsm);padding:22px;box-shadow:var(--shsm)}
.clbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--primary);margin-bottom:16px}

/* ─── MODAL ─── */
.mmask{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.mbox{background:#fff;border-radius:var(--r);padding:30px;width:100%;max-width:440px;box-shadow:0 24px 60px rgba(15,23,42,.2);animation:fadeUp .25s ease both}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mtitle{font-size:17px;font-weight:700;color:var(--primary)}
.mclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}

/* ─── WELCOME ─── */
.wbox{background:#fff;border-radius:var(--r);padding:36px;width:100%;max-width:480px;box-shadow:0 24px 60px rgba(15,23,42,.25);animation:fadeUp .3s ease both;text-align:center}
.wicon{font-size:44px;margin-bottom:16px}
.wtitle{font-size:22px;font-weight:800;color:var(--primary);margin-bottom:10px}
.wbody{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:28px;max-width:340px;margin-left:auto;margin-right:auto}
.wbtns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* ─── WALKTHROUGH ─── */
.wt-ov{position:fixed;inset:0;background:rgba(15,23,42,.72);z-index:500}
.wt-tip{position:fixed;z-index:600;background:#fff;border-radius:16px;padding:24px 26px;max-width:360px;box-shadow:0 16px 48px rgba(15,23,42,.25);animation:fadeUp .3s ease both}
.wt-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--turquoise);margin-bottom:8px}
.wt-tit{font-size:16px;font-weight:800;color:var(--primary);margin-bottom:10px}
.wt-bod{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:20px}
.wt-foot{display:flex;justify-content:space-between;align-items:center}
.wt-dots{display:flex;gap:5px}
.wt-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .2s}
.wt-dot.on{background:var(--turquoise)}
.wt-nav{display:flex;gap:8px}

/* ─── SUCCESS ─── */
.sw{text-align:center;padding:48px 20px}
.sring{width:68px;height:68px;border-radius:50%;background:#DCFCE7;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px}
.rid{background:var(--bg);border-radius:8px;padding:9px 20px;font-size:12px;font-weight:700;color:var(--primary);display:inline-block;margin:12px 0;font-family:monospace;letter-spacing:.5px}
.rpills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.rpill{background:var(--bg);border-radius:10px;padding:10px 18px;text-align:center}
.rpl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.rpv{font-size:14px;font-weight:800;color:var(--primary);margin-top:3px}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:64px 20px}
.ei{font-size:42px;margin-bottom:14px}
.empty h3{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:8px}
.empty p{font-size:13px;color:var(--muted);line-height:1.6}


/* ── AI LITERACY CHECKBOX ── */
.literacy-box{background:#EFF6FF;border:1.5px solid #BFDBFE;border-radius:12px;padding:16px 18px;margin-bottom:20px;display:flex;gap:12px;align-items:flex-start}
.literacy-box.checked{background:#F0FDF4;border-color:#86EFAC}
.lchk{width:20px;height:20px;border-radius:5px;border:2px solid #93C5FD;background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;margin-top:1px;transition:all .2s;font-size:12px}
.lchk.on{background:#2563EB;border-color:#2563EB;color:#fff}
.literacy-box.checked .lchk{background:#16A34A;border-color:#16A34A}
.literacy-txt{font-size:12.5px;line-height:1.7;color:#1E40AF}
.literacy-box.checked .literacy-txt{color:#14532D}
.literacy-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#2563EB;margin-bottom:5px}
.literacy-box.checked .literacy-lbl{color:#15803D}

/* ── AI METADATA BLOCK ── */
.ai-meta-block{background:#F8F5FF;border:1.5px solid #DDD6FE;border-radius:12px;padding:18px;margin-bottom:16px}
.ai-meta-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#6D28D9;margin-bottom:14px}
.ai-sys-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

/* ── SUSPEND OPTION ── */
.dopt.suspend:hover{border-color:#D97706;background:#FFFBEB}
.dopt.suspend.sel{border-color:#D97706;background:#FFFBEB}
.dopt.suspend.sel .dt{color:#92400E}
.dopt.suspend.sel .dd{color:#B45309}
.suspend-box{background:#FFFBEB;border:1.5px solid #FCD34D;border-radius:12px;padding:18px;margin-bottom:14px}
.suspend-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#92400E;margin-bottom:12px}
.suspend-reason-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.sropt{padding:10px 12px;border:1.5px solid #FCD34D;border-radius:8px;cursor:pointer;background:#fff;font-size:12.5px;font-weight:600;color:#78350F;transition:all .18s;text-align:center}
.sropt:hover{background:#FEF9C3}
.sropt.sel{background:#F59E0B;border-color:#D97706;color:#fff}

/* ── OVERRIDE RATIONALE ── */
.or-rationale{background:#fff;border:1.5px solid #DDD6FE;border-radius:8px;padding:12px 14px;margin:12px 0;position:relative}
.or-rat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#6D28D9;margin-bottom:7px}
.char-count{position:absolute;right:10px;top:10px;font-size:10px;color:var(--muted)}
.char-count.over{color:var(--reject)}

/* ── ARCHIVE + SUSPEND BADGES ── */
.h-suspend{border-left-color:#D97706}
.mb-suspend{background:#FFFBEB;color:#92400E}
.arc-entry{opacity:.55}
.arc-badge{background:#F3F4F6;color:#6B7280;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.5px;margin-left:8px}

/* ── SESSION TIMEOUT ── */
.timeout-overlay{position:fixed;inset:0;background:rgba(15,23,42,.75);z-index:800;display:flex;align-items:center;justify-content:center;padding:24px}
.timeout-box{background:#fff;border-radius:20px;padding:36px;max-width:400px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.timeout-bar{height:4px;background:var(--border);border-radius:2px;margin:16px 0;overflow:hidden}
.timeout-fill{height:100%;background:var(--turquoise);border-radius:2px;transition:width 1s linear}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:1000;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.2);max-width:320px;animation:toastIn .3s ease both;font-family:'Inter',sans-serif}

/* ─── FLOATING FEEDBACK ─── */
.fbfloat{position:fixed;bottom:28px;left:28px;z-index:300;display:flex;align-items:center;gap:9px;background:var(--primary);color:#fff;padding:11px 18px;border-radius:50px;box-shadow:0 4px 20px rgba(10,26,47,.25);cursor:pointer;border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;transition:all .2s;text-decoration:none}
.fbfloat:hover{background:var(--primary-hover);transform:translateY(-2px)}
.fbdot{width:8px;height:8px;border-radius:50%;background:var(--turquoise);animation:pulseDot 2s infinite}

/* ─── CTA FOOTER ─── */
.footer{background:var(--primary);border-top:3px solid var(--turquoise);padding:32px}
.fi2{max-width:960px;margin:0 auto}
.ftop{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap;margin-bottom:24px}
.fleft{flex:1;min-width:260px}
.flrow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.flbox{width:34px;height:34px;background:var(--turquoise);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--primary)}
.forg{color:#fff;font-size:13px;font-weight:700}
.ftag{color:rgba(255,255,255,.4);font-size:10px;margin-top:2px;font-style:italic}
.fbody{color:rgba(255,255,255,.55);font-size:12px;line-height:1.75;max-width:440px;margin-bottom:14px}
.flinks{display:flex;gap:18px;flex-wrap:wrap}
.flinks a{color:var(--turquoise);font-size:12px;font-weight:600;text-decoration:none}
.flinks a:hover{text-decoration:underline}
.fright{text-align:right;min-width:220px}
.frhead{color:rgba(255,255,255,.4);font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px}
.frbody{color:rgba(255,255,255,.6);font-size:12px;line-height:1.65;margin-bottom:16px;max-width:260px;margin-left:auto}
.frbtn{display:inline-block;background:var(--turquoise);color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;transition:background .2s}
.frbtn:hover{background:#18a8bd}
.fbot{border-top:1px solid rgba(255,255,255,.08);padding-top:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
.fcopy{color:rgba(255,255,255,.25);font-size:11px}
.fslogan{color:var(--turquoise);font-size:11px;font-style:italic;font-weight:500}

@media(max-width:680px){
  .wrap{padding:16px}.hdr{padding:0 16px}
  .statgrid{grid-template-columns:1fr 1fr}.chartgrid{grid-template-columns:1fr}

  .resume-bar{padding:12px 16px}
}

/* ================================================================
   ACTIVITY LOGGER
   ----------------------------------------------------------------
   Fire-and-forget telemetry to Google Sheets via Apps Script.
   Replace LOGGER_ENDPOINT with your deployed Apps Script URL.

   ACTION CODES (short codes sent in transit):
     A01=ACCESS_GRANTED  A02=ACCESS_DENIED   A03=ACCESS_REVOKED
     R01=REVIEW_STARTED  R02=STEP_ADVANCE    R03=REVIEW_COMPLETE
     R04=REVIEW_ABANDON  T01=TAB_REVIEW      T02=TAB_AUDIT
     T03=TAB_GOVERNANCE  T04=TOUR_STARTED    T05=TOUR_SKIPPED
     E01=EXPORT_CSV      E02=ESCALATION_OPEN E03=AUDIT_CLEARED
     S01=SESSION_START   S02=SESSION_RESUME
================================================================ */

const LOGGER_ENDPOINT = 'YOUR_APPS_SCRIPT_WEB_APP_URL_HERE';

// Lightweight char-rotation obfuscation so action codes are not
// plain text in the network payload. Not encryption.
function _obs(str, offset) {
  offset = offset || 7;
  return btoa(str.split('').map(function(c){ return String.fromCharCode(c.charCodeAt(0) + offset); }).join(''));
}

// Stable anonymous session ID per browser session — no PII
function _getSessionId() {
  var key = '_hid';
  var id = sessionStorage.getItem(key);
  if (!id) {
    id = 'anon_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 7);
    sessionStorage.setItem(key, id);
  }
  return id;
}

// djb2-style hash of access code — never sends the raw code,
// gives per-user analytics without exposing identity
function _hashCode(code) {
  if (!code) return 'anon';
  var h = 5381;
  for (var i = 0; i < code.length; i++) { h = (h * 33) ^ code.charCodeAt(i); }
  return 'u_' + (h >>> 0).toString(36);
}

/*
  logEvent(action, details)
  ─────────────────────────
  action  : ACTION CODE string e.g. 'A01', 'R03'
  details : optional object with lightweight metadata.
            Max 5 keys, values truncated to 80 chars.
            No PII, no scenario text, no sensitive data.

  Fire-and-forget. Returns void. Never throws. Never blocks UI.
  Safe to call anywhere in the app.
*/
async function logEvent(action, details) {
  details = details || {};
  if (!LOGGER_ENDPOINT || LOGGER_ENDPOINT.indexOf('YOUR_') === 0) return;

  var code = sessionStorage.getItem('hos_code') || null;
  var dEntries = Object.entries(details).slice(0, 5);
  var dPayload = {};
  dEntries.forEach(function(kv) { dPayload['d_' + kv[0]] = String(kv[1]).slice(0, 80); });

  var payload = Object.assign({
    sid: _getSessionId(),
    uid: _hashCode(code),
    act: _obs(action),
    ts:  new Date().toISOString(),
    tz:  Intl.DateTimeFormat().resolvedOptions().timeZone,
    ref: document.referrer ? 'ext' : 'direct'
  }, dPayload);

  try {
    await fetch(LOGGER_ENDPOINT, {
      method:    'POST',
      mode:      'no-cors',
      keepalive: true,
      headers:   {'Content-Type': 'application/json'},
      body:      JSON.stringify(payload)
    });
  } catch(e) {
    // Intentionally silent — logging must never affect user experience
  }
}

/* ─────────────────────────────────────────────────────────────────
   SCENARIO-AWARE SCORER
   Scores each item by: trigger keyword matches in scenario (primary)
   + dtype match bonus + sector match bonus.
   Returns top N, with fallback items used to guarantee minimum count.
───────────────────────────────────────────────────────────────── */
// Natural-language synonym map — expands common reviewer summary words
// into the technical terms the trigger library was built against.
// This bridges the gap between how reviewers write and how items are tagged.
const NL_SYNONYMS = {
  'loan': ['credit','borrow','lending','finance','facility'],
  'money': ['funds','payment','transfer','cash','capital'],
  'company': ['business','entity','firm','organisation','corporate'],
  'person': ['individual','customer','client','applicant','subject'],
  'check': ['verify','screen','assess','review','examine'],
  'flag': ['alert','warning','concern','signal','issue'],
  'history': ['record','background','track record','past','previous'],
  'account': ['transaction','banking','statement','activity'],
  'offshore': ['foreign','international','overseas','jurisdiction'],
  'new': ['recent','newly','just','first','initial','opening'],
  'unknown': ['unclear','unverified','incomplete','not provided','missing'],
  'large': ['high value','significant','substantial','material','elevated'],
  'unusual': ['anomal','suspicious','unexpected','inconsistent','irregular'],
  'fake': ['fraud','false','misrepresent','fabricat','forgery'],
  'problem': ['concern','issue','risk','exposure','gap'],
  'report': ['document','file','submission','return','filing'],
  'fail': ['breach','violation','non-complian','deficien','shortfall'],
  'old': ['historic','legacy','previous','prior','existing'],
  'complex': ['layered','structured','opaque','intricate','complicated'],
  'apply': ['applicant','application','request','seek','submit'],
};

function expandScenario(scenario) {
  let expanded = scenario.toLowerCase();
  Object.entries(NL_SYNONYMS).forEach(([word, synonyms]) => {
    if(expanded.includes(word)) {
      synonyms.forEach(syn => { if(!expanded.includes(syn)) expanded += ' ' + syn; });
    }
  });
  return expanded;
}

function scoreItems(items, scenario, sector, dtype, topN) {
  const t = expandScenario(scenario);
  const seen = new Set();
  const scored = items.map(item => {
    let score = 0;
    // Keyword match in expanded scenario (2 pts each)
    item.triggers.forEach(kw => { if(kw && t.includes(kw.toLowerCase())) score += 2; });
    // Dtype match — strong signal, guarantees relevance even with no keyword hits
    const dtypeMatch = item.dtype && item.dtype.length > 0 && item.dtype.includes(dtype);
    if(dtypeMatch) score += 5;
    // Sector match bonus
    if(item.sector && item.sector.length > 0 && item.sector.includes(sector)) score += 3;
    // Generic fallback items (no dtype, no sector, no triggers) get lowest priority
    if(!item.triggers.length && !item.dtype.length && !item.sector.length) score -= 2;
    return { text: item.text, score, dtypeMatch };
  });

  const ranked = scored
    .sort((a,b) => b.score - a.score)
    .filter(i => { if(seen.has(i.text)) return false; seen.add(i.text); return true; });

  // Layer 1: dtype-matched items with any keyword hit (most relevant)
  const tier1 = ranked.filter(i => i.dtypeMatch && i.score > 5);
  // Layer 2: dtype-matched items even without keyword hit
  const tier2 = ranked.filter(i => i.dtypeMatch && i.score <= 5);
  // Layer 3: keyword hits without dtype match
  const tier3 = ranked.filter(i => !i.dtypeMatch && i.score > 0);
  // Layer 4: pure fallbacks
  const tier4 = ranked.filter(i => i.score <= 0);

  const pool = [...tier1, ...tier2, ...tier3, ...tier4];
  // Deduplicate again across tiers
  const finalSeen = new Set();
  const final = pool.filter(i => {
    if(finalSeen.has(i.text)) return false;
    finalSeen.add(i.text);
    return true;
  });
  return final.slice(0, topN).map(i => i.text);
}

/* SCENARIO-AWARE ACTION BUILDER
   Selects the recommended action based on decision + dtype,
   then enriches it with any specific entities mentioned in the scenario.
*/
function buildAction(decision, dtype, sector, scenario) {
  // Resolve action — dtype first, then sector, then generic
  const decActions = ACTIONS[decision] || {};
  const base = decActions[dtype] || decActions[sector] || decActions['generic'] || Object.values(decActions)[0] || 'Document the decision rationale and apply appropriate monitoring.';
  const t = scenario.toLowerCase();
  // Context-specific prefixes based on what appears in the scenario
  const prefixes = [];
  if((t.includes('fca') || t.includes('pra')) && decision==='REJECT') prefixes.push('Notify FCA/PRA under SUP 15.');
  if(t.includes('cbn') && decision==='REJECT') prefixes.push('Notify CBN immediately.');
  if(t.includes('sar') || t.includes('suspicious activity report')) prefixes.push('File SAR with NCA/NFIU.');
  if((t.includes('pep') || t.includes('politically exposed')) && decision==='FLAG') prefixes.push('Escalate to MLRO — PEP connection requires senior sign-off.');
  if((t.includes('sanction') || t.includes('watchlist')) && decision !== 'APPROVE') prefixes.push('Freeze activity pending sanctions clearance.');
  if(t.includes('data breach') || t.includes('cyber incident')) prefixes.push('Notify ICO within 72 hours if personal data affected.');
  return (prefixes.length ? prefixes.join(' ') + ' ' : '') + base;
}

function detectNegation(text,phrase){const idx=text.indexOf(phrase);if(idx<0)return false;const before=text.substring(Math.max(0,idx-40),idx).toLowerCase();return NEGATORS.some(n=>before.includes(n));}
function detectJurisdiction(text){const t=text.toLowerCase();const scores={};Object.entries(JURISDICTIONS).forEach(([jur,terms])=>{scores[jur]=terms.filter(t2=>t.includes(t2.toLowerCase())).length;});return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];}
function clamp(v,min,max){return Math.min(max,Math.max(min,v));}
function rand(n){return Math.floor(Math.random()*n);}

function runEngine(sector,dtype,scenario){
  const t=scenario.toLowerCase();
  let score=0;

  PHRASES_HIGH.forEach(ph=>{if(t.includes(ph)){if(detectNegation(t,ph))score+=1;else score+=3;}});
  PHRASES_MED.forEach(ph=>{if(t.includes(ph)){if(detectNegation(t,ph))score-=0.5;else score+=1;}});
  PHRASES_LOW.forEach(ph=>{if(t.includes(ph)){if(detectNegation(t,ph))score+=1;else score-=2;}});

  const sb=SECTOR_BOOSTERS[sector];
  if(sb){(sb.high||[]).forEach(p=>{if(t.includes(p.toLowerCase()))score+=2;});(sb.low||[]).forEach(p=>{if(t.includes(p.toLowerCase()))score-=1.5;});}

  let decision,conf;
  if(score>=9){decision='REJECT';conf=clamp(75+Math.floor(score)+rand(8),75,97);}
  else if(score>=5){decision='REJECT';conf=clamp(62+Math.floor(score)+rand(10),62,88);}
  else if(score>=2){decision='FLAG';conf=clamp(55+Math.floor(score*2)+rand(10),55,85);}
  else if(score>=0){decision=['FLAG','REFER'][Math.floor(Math.random()*2)];conf=clamp(48+rand(18),48,75);}
  else if(score>=-3){decision='APPROVE';conf=clamp(55+Math.abs(score)*3+rand(10),55,82);}
  else{decision='APPROVE';conf=clamp(72+Math.abs(score)+rand(10),72,95);}

  const tier=conf>=75?'h':conf>=55?'m':'l';
  const jur=detectJurisdiction(scenario);

  const sLabel=sector||'regulated sector';
  const dLabel=dtype||'compliance decision';
  const summaryMap={
    APPROVE:`Assessment outcome: Approve. This AI output for a ${dLabel} in the ${sLabel} sector presents a risk profile within acceptable parameters for structured review.`,
    FLAG:`Assessment outcome: Flag for review. This AI output contains risk indicators that require structured human review before a final determination is made.`,
    REJECT:`Assessment outcome: Reject. This AI output presents a risk profile that exceeds acceptable thresholds for the ${sLabel} context.`,
    REFER:`Assessment outcome: Refer for specialist review. This AI output requires senior-level or specialist assessment before a determination can be finalised.`,
  };

  // ── SCENARIO-AWARE CONTENT ASSEMBLY ──
  const riskFlags = scoreItems(FLAG_ITEMS, scenario, sector, dtype, 4);

  // Data gaps: scenario-aware scored
  const dataGaps = scoreItems(DATA_GAP_ITEMS, scenario, sector, dtype, 3);

  // Regulatory references: scored + jurisdiction layer
  let regPool = [...REG_ITEMS];
  // Give jurisdiction-specific refs a boost
  if(jur==='nigeria') regPool = regPool.map(r => ({...r, triggers:[...r.triggers,'nigeria','cbn','nfiu']}));
  const regRefs = scoreItems(regPool, scenario, sector, dtype, 3);

  // Recommended action: dtype + decision driven, with scenario entity enrichment
  const action = buildAction(decision, dtype, sector, scenario);

  return{decision,confidence:conf,summary:summaryMap[decision],rationale:RATIONALE[decision][tier],risk_flags:riskFlags,recommended_action:action,data_gaps:dataGaps,regulatory_references:regRefs,_debug:{score:score.toFixed(2),tier,jurisdiction:jur}};
}

                {aiSystemSel==='Other / Not Listed'&&<input className="fi" style={{marginTop:8}} type="text" placeholder="Enter AI system name..." value={aiSystemCustom} onChange={e=>setAiSystemCustom(e.target.value)}/>}
              </div>
              <div>
                <label className="fl">Model Version</label>
                <input className="fi" type="text" placeholder='e.g. v3.2.1 or "Unknown"' value={aiModelVersion} onChange={e=>setAiModelVersion(e.target.value)}/>
              </div>
              <div>
                <label className="fl">AI Output Generated At</label>
                <input className="fi" type="datetime-local" value={aiOutputTimestamp} onChange={e=>setAiOutputTimestamp(e.target.value)}/>
              </div>
            </div>
        </div>

        {/* REVIEWER IDENTITY — three fields */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginTop:16}}>
          <div>
            <label className="fl">Organisation Name</label>
            <input className="fi" type="text" placeholder="e.g. Vantage Capital Ltd" value={orgName} onChange={e=>setOrgName(e.target.value)}/>
          </div>
          <div>
            <label className="fl">Reviewer Name *</label>
            <input className="fi" type="text" placeholder="e.g. Sarah Johnson" value={reviewer} onChange={e=>setReviewer(e.target.value)}/>
          </div>
          <div>
            <label className="fl">Role / Job Title *</label>
            <input className="fi" type="text" placeholder="e.g. Senior Compliance Analyst" value={reviewerRole} onChange={e=>setReviewerRole(e.target.value)}/>
          </div>
        </div>

        {/* AI LITERACY ACKNOWLEDGEMENT */}
        <div className={`literacy-box ${literacyChecked?'checked':''}`} style={{marginTop:16}} onClick={()=>setLiteracyChecked(p=>!p)}>
          <div className={`lchk ${literacyChecked?'on':''}`}>{literacyChecked&&'✓'}</div>
          <div>
            <div className="literacy-lbl">AI Literacy Acknowledgement</div>
            <div className="literacy-txt">
              I confirm that I have sufficient understanding of this AI system's purpose, capabilities, and known limitations to perform a meaningful review of its output. I am exercising independent judgement and not relying solely on the AI output to reach my conclusion.
            </div>
          </div>
        </div>

        <div className="btn-row">
          <button className="btn btn-p" onClick={generate} disabled={loading}>
            {loading&&<span className="spinner"/>}{loading?'Analysing scenario...':'Generate Assessment Output ›'}
          </button>
          <span style={{fontSize:11,color:'var(--muted)'}}>All fields marked * are required. Include detail — richer scenarios produce more contextual assessments.</span>
        </div>
      </div>
    </div>
  );
}

/* ══ STEP 2 ══ */
function Step2({result,onNext,onBack}){
  const col={APPROVE:'var(--approve)',FLAG:'var(--flag)',REJECT:'var(--reject)',REFER:'var(--refer)'};
  const bg={APPROVE:'var(--approve-bg)',FLAG:'var(--flag-bg)',REJECT:'var(--reject-bg)',REFER:'var(--refer-bg)'};
  const ico={APPROVE:'✅',FLAG:'⚠️',REJECT:'❌',REFER:'↗️'};
  const cc=result.confidence>=75?'var(--approve)':result.confidence>=50?'var(--flag)':'var(--reject)';
  const modeNote='⚠️ <strong>Assessment Engine Notice:</strong> The output below is generated by a structured local assessment engine using keyword and phrase-level risk analysis calibrated to the sector and decision type you selected. It is a structured starting point for human review — <em>not</em> a regulatory determination. The five-lens protocol on the next step is where your defensible judgement is recorded. Treat this output as a structured prompt, not a conclusion.';
  return(
    <div className="fade-up">
      <div className="eng-note" dangerouslySetInnerHTML={{__html:modeNote}}/>
      <div className="alert a-info" style={{marginBottom:16}}><span>ℹ️</span><span>Review the assessment output carefully before proceeding to the five-lens structured review protocol.</span></div>
      <div className="card">
        <div className="card-lbl">Assessment Output — AI Output Review</div>
        <div className="otop">
          <span className="dbadge" style={{background:bg[result.decision],color:col[result.decision]}}>{ico[result.decision]} {result.decision}</span>
          <div className="cfb"><div><div className="cfm">Confidence</div><div className="cfn" style={{color:cc}}>{result.confidence}%</div></div><div style={{flex:1}}><div className="cfbar"><div className="cffill" style={{width:result.confidence+'%'}}/></div></div></div>
        </div>
        <div className="ai-h">{result.summary}</div>
        <div className="ai-r">{result.rationale}</div>
        <div className="ai-g">
          <div className="ai-s"><div className="ai-sl">⚠️ Risk Flags Identified</div><div>{result.risk_flags.map((f,i)=><span key={i} className="tag tag-r">{f}</span>)}</div></div>
          <div className="ai-s"><div className="ai-sl">📋 Recommended Action</div><p>{result.recommended_action}</p></div>
          <div className="ai-s"><div className="ai-sl">🗂️ Data Gaps</div><div>{result.data_gaps.map((g,i)=><span key={i} className="tag tag-g">{g}</span>)}</div></div>
          <div className="ai-s"><div className="ai-sl">⚖️ Regulatory References</div><div>{result.regulatory_references.map((r,i)=><span key={i} className="tag tag-b">{r}</span>)}</div></div>
        </div>
      </div>
      <div className="btn-row"><button className="btn btn-o" onClick={onBack}>← Back</button><button className="btn btn-p" onClick={onNext}>Begin Structured Review ›</button></div>
    </div>
  );
}

/* ══ STEP 3 ══ */
function Step3({onNext,onBack,saved}){
  const [ratings,setRatings]=useState(saved?.ratings||{});
  const [notes,setNotes]=useState(saved?.notes||{});
  const vals=Object.values(ratings),allRated=vals.length===LENSES.length,avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  const sc=avg<2.5?'var(--reject)':avg<3.5?'var(--flag)':'var(--approve)';
  const vt=avg<2.5?'Significant concerns — Override or Escalation recommended':avg<3.5?'Moderate concerns — Approve with Conditions may be appropriate':'Review supports the output — Approval is appropriate';
  return(
    <div className="fade-up">
      <div className="card">
        <div className="card-lbl">Structured Review Protocol — Five-Lens Assessment</div>
        <p style={{fontSize:12.5,color:'var(--muted)',marginBottom:20,lineHeight:1.65}}>Rate each analytical lens from 1 (Major Concern) to 5 (Strong). Your scores drive the system recommendation on the next step. All five lenses must be rated.</p>
        {LENSES.map(l=>{const r=ratings[l.id],lc=r?(r<=2?'var(--reject)':r===3?'var(--flag)':'var(--approve)'):'var(--muted)';return(
          <div key={l.id} className={`lcard ${r?'rated':''}`}>
            <div className="lhdr"><div><div className="lt">{l.icon} {l.title}</div><div className="ld">{l.desc}</div></div><div className="ls" style={{color:lc}}>{r?R_LABELS[r]:'Not rated'}</div></div>
            <div className="rrow">{[1,2,3,4,5].map(n=>(<button key={n} className={`rb ${ratings[l.id]===n?'sel':''}`} onClick={()=>setRatings(p=>({...p,[l.id]:n}))}><span className="rn">{n}</span><span className="rl">{R_LABELS[n]}</span></button>))}</div>
            <textarea className="fi" style={{minHeight:44,fontSize:12,padding:'8px 12px',marginBottom:0}} placeholder="Optional note for this dimension..." value={notes[l.id]||''} onChange={e=>setNotes(p=>({...p,[l.id]:e.target.value}))}/>
          </div>
        );})}
        {vals.length>0&&<div className="score-row"><div><div className="sbig">{avg.toFixed(1)}</div><div style={{fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginTop:3}}>Avg Score</div></div><div className="sbarw"><div className="sbar"><div className="sfill" style={{width:`${(avg/5)*100}%`,background:sc}}/></div><div className="stxt" style={{color:sc}}>{vt}</div></div></div>}
      </div>
      <div className="btn-row"><button className="btn btn-o" onClick={onBack}>← Back</button><button className="btn btn-p" style={{opacity:allRated?1:.5,cursor:allRated?'pointer':'not-allowed'}} onClick={()=>allRated&&onNext({ratings,notes,avg:avg.toFixed(2)})} disabled={!allRated}>Proceed to Decision ›</button></div>
    </div>
  );
}

/* ══ STEP 4 ══ */
function Step4({avgScore,reviewData,onNext,onBack,saved}){
  const [decision,setDecision]=useState(saved?.decision||null);
  const [orR,setOrR]=useState(saved?.orR||[]);
  const [orN,setOrN]=useState(saved?.orN||'');
  const [orRationale,setOrRationale]=useState(saved?.orRationale||'');
  const [cN,setCN]=useState(saved?.cN||'');
  const [suspendReason,setSuspendReason]=useState(saved?.suspendReason||'');
  const [suspendNotes,setSuspendNotes]=useState(saved?.suspendNotes||'');
  const [suspendEscalate,setSuspendEscalate]=useState(saved?.suspendEscalate||false);
  // Escalation fields
  const [escName,setEscName]=useState(saved?.escName||'');
  const [escEmail,setEscEmail]=useState(saved?.escEmail||'');

  const avg=parseFloat(avgScore),sCls=avg<2.5?'bad':avg<3.5?'warn':'good';
  const sTxt=avg<2.5?`System Recommendation: Lens scores indicate significant concerns (avg ${avg.toFixed(1)}/5). Override or Escalation is recommended.`:avg<3.5?`System Recommendation: Lens scores indicate moderate concerns (avg ${avg.toFixed(1)}/5). Approval with Conditions is appropriate.`:`System Recommendation: Lens scores support the output (avg ${avg.toFixed(1)}/5). Approval appears appropriate.`;
  const toggleOR=id=>setOrR(r=>r.includes(id)?r.filter(x=>x!==id):[...r,id]);
  const showOr=decision==='override';
  const showEsc=decision==='escalate';
  const showSuspend=decision==='suspend';
  const ratLen=orRationale.length;

  // Build email preview for escalation
  const previewEntry={
    recipientName:escName,recipientEmail:escEmail,
    reviewerName:reviewData?.reviewer,orgName:reviewData?.orgName,
    sector:reviewData?.sector,dtype:reviewData?.dtype,inputType:reviewData?.inputType,
    aiDecision:reviewData?.result?.decision,aiConfidence:reviewData?.result?.confidence,
    aiSummary:reviewData?.result?.summary,avgLensScore:avgScore,
    lensRatings:reviewData?.lens?.ratings,orNotes:orN,
    id:'HOS-PREVIEW',timestamp:new Date().toISOString()
  };
  const emailPreview=buildEscalationEmail(previewEntry);

  function openMailto(){
    logEvent('E02',{to:escEmail?'set':'unset'});
    const {subject,body,recipientEmail:to}=buildEscalationEmail({
      ...previewEntry,id:'HOS-'+genId().split('-')[1]
    });
    const url=`mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    // Use anchor click — more reliable than window.open for mailto across browsers/GitHub Pages
    const a=document.createElement('a');
    a.href=url;
    a.style.display='none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  return(
    <div className="fade-up">
      <div className="card">
        <div className="card-lbl">Reviewer Decision</div>
        <div className={`sug ${sCls}`}>💡 {sTxt}</div>
        <div className="dgrid" style={{gridTemplateColumns:'1fr 1fr 1fr',gap:10}}>
          {H_OPTIONS_FULL.map(d=>(
            <div key={d.id} className={`dopt ${d.id==='suspend'?'suspend':''} ${decision===d.id?'sel':''}`} onClick={()=>setDecision(d.id)}>
              <span className="di">{d.icon}</span><span className="dt">{d.title}</span><span className="dd">{d.desc}</span>
            </div>
          ))}
        </div>
        {decision==='suspend'&&<div className="alert a-warn" style={{margin:'0 0 16px'}}><span>⏸️</span><strong>This decision has been suspended. No action should be taken until senior review is complete.</strong></div>}

        {/* OVERRIDE TAXONOMY */}
        {showOr&&<div className="orbox">
          <div className="orlbl">🔍 Override Reasoning Taxonomy — select all that apply</div>
          <div className="orgrid">{OVERRIDES.map(r=>{const sel=orR.includes(r.id);return(<div key={r.id} className={`orch ${sel?'sel':''}`} onClick={()=>toggleOR(r.id)}><div className="orchk">{sel&&'✓'}</div><div><div className="orcn">{r.label}</div><div className="orcd">{r.desc}</div></div></div>);})}</div>
          <div className="or-rationale">
            <div className="or-rat-lbl">Override Rationale (required for audit) <span className={`char-count ${ratLen>200?'over':''}`}>{ratLen}/200</span></div>
            <input type="text" style={{width:'100%',padding:'8px 10px',border:'1.5px solid #DDD6FE',borderRadius:7,fontSize:13,fontFamily:'Inter,sans-serif',outline:'none'}} maxLength={220} placeholder="State clearly why the AI output is being overridden — max 200 characters..." value={orRationale} onChange={e=>setOrRationale(e.target.value)}/>
            {ratLen===0&&<div style={{fontSize:11,color:'var(--reject)',marginTop:5}}>This field is required to complete the review.</div>}
          </div>
          <label className="fl">Extended Notes</label>
          <textarea className="fi" style={{minHeight:70,marginBottom:0}} placeholder="Additional context, evidence references, or supporting documentation..." value={orN} onChange={e=>setOrN(e.target.value)}/>
        </div>}

        {/* ESCALATION EMAIL BUILDER */}
        {showEsc&&<div className="escbox">
          <div className="esclbl">🚨 Escalation — Pre-Populated Email</div>
          <p style={{fontSize:12,color:'#7f1d1d',marginBottom:16,lineHeight:1.65}}>Enter the senior reviewer's details below. The tool will build a complete, pre-addressed escalation email covering the assessment result, lens scores, and your notes. Click "Open in Email Client" to send — it will open in your default email application (Outlook, Gmail, etc.) with everything already written.</p>
          <div className="escgrid">
            <div><label className="fl">Recipient Name</label><input className="fi" type="text" placeholder="e.g. Jane Smith" value={escName} onChange={e=>setEscName(e.target.value)}/></div>
            <div><label className="fl">Recipient Email</label><input className="fi" type="email" placeholder="e.g. j.smith@organisation.com" value={escEmail} onChange={e=>setEscEmail(e.target.value)}/></div>
          </div>
          <label className="fl">Escalation Notes</label>
          <textarea className="fi" style={{minHeight:80,marginBottom:12}} placeholder="Explain why this case is being escalated and what decision or action you are requesting from the senior reviewer..." value={orN} onChange={e=>setOrN(e.target.value)}/>
          <div className="esc-preview-lbl">📧 Email Preview</div>
          <div className="esc-preview">{`To: ${escEmail||'[recipient email]'}\nSubject: ${emailPreview.subject}\n\n${emailPreview.body}`}</div>
          <div style={{marginTop:14}}>
            <button className="btn btn-e" onClick={openMailto} style={{marginRight:10}} disabled={!escEmail.trim()}>📬 Open in Email Client</button>
            <span style={{fontSize:11,color:'#7f1d1d'}}>Opens your email app with this message pre-filled. You press send.</span>
          </div>
        </div>}

        {/* SUSPEND BOX */}
        {showSuspend&&<div className="suspend-box">
          <div className="suspend-lbl">⏸️ Suspension Reason</div>
          <p style={{fontSize:12,color:'#78350F',marginBottom:14,lineHeight:1.6}}>Select the primary reason for halting this decision. This is captured separately in the audit trail as a pre-action suspension — a stronger compliance position than a post-action override.</p>
          <div className="suspend-reason-grid">
            {SUSPEND_REASONS.map(r=>(
              <div key={r} className={`sropt ${suspendReason===r?'sel':''}`} onClick={()=>setSuspendReason(r)}>{r}</div>
            ))}
          </div>
          <label className="fl">Additional Notes</label>
          <textarea className="fi" style={{minHeight:70,marginBottom:12}} placeholder="Provide any additional context about why this decision has been suspended and what must happen before it can be reactivated..." value={suspendNotes} onChange={e=>setSuspendNotes(e.target.value)}/>
          <div style={{display:'flex',alignItems:'center',gap:10,padding:'12px 14px',background:'#fff',borderRadius:8,border:'1px solid #FCD34D',cursor:'pointer'}} onClick={()=>setSuspendEscalate(p=>!p)}>
            <div style={{width:18,height:18,borderRadius:4,border:'2px solid #D97706',background:suspendEscalate?'#D97706':'#fff',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff',fontSize:11,flexShrink:0}}>{suspendEscalate&&'✓'}</div>
            <span style={{fontSize:12.5,color:'#78350F',fontWeight:600}}>Also send escalation email to a senior reviewer</span>
          </div>
          {suspendEscalate&&<div style={{marginTop:12,display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <div><label className="fl">Recipient Name</label><input className="fi" type="text" placeholder="e.g. Jane Smith" value={escName} onChange={e=>setEscName(e.target.value)}/></div>
            <div><label className="fl">Recipient Email</label><input className="fi" type="email" placeholder="e.g. j.smith@org.com" value={escEmail} onChange={e=>setEscEmail(e.target.value)}/></div>
          </div>}
        </div>}

        {decision==='approve_cond'&&<div><label className="fl">Conditions &amp; Caveats</label><textarea className="fi" style={{minHeight:90,marginBottom:0}} placeholder="Document the conditions, monitoring requirements, or additional controls applied to this conditional approval..." value={cN} onChange={e=>setCN(e.target.value)}/></div>}
      </div>
      <div className="btn-row"><button className="btn btn-o" onClick={onBack}>← Back</button><button className="btn btn-t" style={{opacity:decision?1:.5,cursor:decision?'pointer':'not-allowed'}} onClick={()=>{
            if(!decision) return;
            if(decision==='override'&&!orRationale.trim()) return alert('Override Rationale is required before completing the review.');
            if(decision==='suspend'&&!suspendReason) return alert('Please select a suspension reason before completing the review.');
            onNext({decision,orR,orN,orRationale,cN,escName,escEmail,suspendReason,suspendNotes,suspendEscalate});
          }} disabled={!decision}>Submit &amp; Record Review ›</button></div>
    </div>
  );
}

/* ══ STEP 5 ══ */
function Step5({entry,onNew}){
  const isSuspend=entry.humanDecision==='suspend';
  const isOverride=entry.humanDecision==='override';
  return(
    <div className="fade-up"><div className="card"><div className="sw">
      <div className="sring">{isSuspend?'⏸️':'✅'}</div>
      <h2 style={{fontSize:20,fontWeight:800,color:'var(--primary)',marginBottom:6}}>{isSuspend?'Decision Suspended':'Review Complete'}</h2>
      <p style={{fontSize:13,color:'var(--muted)',marginBottom:6}}>
        {isSuspend?'This decision has been suspended and recorded. No action should be taken until senior review is complete.':'This review has been recorded to the audit trail.'}
      </p>
      <div className="rid">{entry.id}</div>
      <div className="rpills">
        {[
          ['Assessment Outcome',entry.aiDecision],
          ['Reviewer Decision',H_LABELS[entry.humanDecision]||entry.humanDecision],
          ['Review Score',`${entry.avgLensScore} / 5.0`],
          ['Review Type','AI Output Review'],
          ...(entry.aiSystem?[['AI System',entry.aiSystem]]:[] ),
          ...(entry.reviewerRole?[['Reviewer Role',entry.reviewerRole]]:[]),
        ].map(([l,v])=>(<div key={l} className="rpill"><div className="rpl">{l}</div><div className="rpv">{v}</div></div>))}
      </div>
      {isSuspend&&entry.suspendReason&&<div style={{marginTop:16,background:'#FFFBEB',border:'1px solid #FCD34D',borderRadius:10,padding:'14px 18px',fontSize:13,color:'#78350F'}}><strong>Suspension reason:</strong> {entry.suspendReason}</div>}
      {isOverride&&entry.orRationale&&<div style={{marginTop:16,background:'#F8F5FF',border:'1px solid #DDD6FE',borderRadius:10,padding:'14px 18px',fontSize:13,color:'#4C1D95'}}><strong>Override rationale:</strong> {entry.orRationale}</div>}
      {(entry.humanDecision==='escalate'||(isSuspend&&entry.escEmail))&&entry.escEmail&&<div style={{marginTop:16,background:'#FFF1F2',border:'1px solid #FECDD3',borderRadius:10,padding:'14px 18px',fontSize:13,color:'#7f1d1d'}}><strong>Escalation logged.</strong> Email was prepared for {entry.escName||entry.escEmail}.</div>}
      <div className="btn-row" style={{justifyContent:'center',marginTop:26}}>
        <button className="btn btn-p" onClick={onNew}>New Review</button>
      </div>
    </div></div></div>
  );
}

/* ══ REVIEW FLOW ══ */
function ReviewTab({onComplete}){
  const [step,setStep]=useState(1);
  const [data,setData]=useState({});
  useEffect(()=>{if(step>1&&Object.keys(data).length>0){localStorage.setItem(SAVE_KEY,JSON.stringify({step,data,savedAt:new Date().toISOString()}));}},[step,data]);
  function go(n){setStep(n);window.scrollTo({top:0,behavior:'smooth'});logEvent('R02',{step:n});}
  function handleS1(d){const nd={...data,...d};setData(nd);go(2);}
  function handleS3(d){const nd={...data,lens:d};setData(nd);go(4);}
  function handleS4(d){
    const entry={
      id:genId(),timestamp:new Date().toISOString(),
      sector:data.sector,sectorCustom:data.sectorCustom||'',
      dtype:data.dtype,dtypeCustom:data.dtypeCustom||'',scenario:data.scenario,
      reviewer:data.reviewer,reviewerRole:data.reviewerRole||'',orgName:data.orgName,
      // AI system metadata
      aiSystem:data.aiSystem||'',aiModelVersion:data.aiModelVersion||'',aiOutputTimestamp:data.aiOutputTimestamp||'',
      // Assessment output
      aiDecision:data.result.decision,aiConfidence:data.result.confidence,
      aiSummary:data.result.summary,aiRiskFlags:data.result.risk_flags,
      // Lens review
      avgLensScore:data.lens.avg,lensRatings:data.lens.ratings,lensNotes:data.lens.notes,
      // Human decision
      humanDecision:d.decision,
      orReasons:d.orR,orNotes:d.orN,orRationale:d.orRationale||'',
      condNotes:d.cN,
      suspendReason:d.suspendReason||'',suspendNotes:d.suspendNotes||'',
      escName:d.escName||'',escEmail:d.escEmail||'',
      archived:false
    };
    setData(p=>({...p,entry}));onComplete(entry);
    localStorage.removeItem(SAVE_KEY);
    go(5);
  }
  function reset(){if(Object.keys(data).length>0&&!data.entry)logEvent('R04',{at:data.step||1});setStep(1);setData({});localStorage.removeItem(SAVE_KEY);}
  return(<div>
    <StepsBar step={step}/>
    {step===1&&<Step1 onNext={handleS1} savedData={data}/>}
    {step===2&&<Step2 result={data.result} onNext={()=>go(3)} onBack={()=>go(1)}/>}
    {step===3&&<Step3 onNext={handleS3} onBack={()=>go(2)} saved={data.lens}/>}
    {step===4&&<Step4 avgScore={data.lens?.avg||3} reviewData={data} onNext={handleS4} onBack={()=>go(3)} saved={data.step4}/>}
    {step===5&&<Step5 entry={data.entry} onNew={reset}/>}
  </div>);
}

/* ══ AUDIT TAB ══ */
function AuditTab({trail,onUpdate}){
  const [filter,setFilter]=useState('all'); // all | active | archived

  // CSV export
  function exportCSV(entries,label){
    logEvent('E01',{count:entries.length});
    const h=['Review ID','Timestamp','Archived','Input Type','Reviewer','Role','Organisation',
      'AI System','Model Version','AI Output Timestamp',
      'Sector','Decision Type','Assessment Outcome','Confidence %',
      'Reviewer Decision','Avg Lens Score','Override Rationale','Override Reasons','Extended Notes',
      'Suspend Reason','Escalation Recipient','Escalation Email','Summary'];
    const r=entries.map(e=>[
      e.id,e.timestamp,e.archived?'Yes':'No',
      'AI Output Review',
      e.reviewer,e.reviewerRole||'',e.orgName,
      e.aiSystem||'',e.aiModelVersion||'',e.aiOutputTimestamp||'',
      e.sector,e.dtype,e.aiDecision,e.aiConfidence,
      H_LABELS[e.humanDecision]||e.humanDecision,e.avgLensScore,
      e.orRationale||'',
      (e.orReasons||[]).map(id=>OVERRIDES.find(r=>r.id===id)?.label||id).join('; '),
      e.orNotes||e.condNotes||'',e.suspendReason||'',

/* ══ GOVERNANCE TAB ══ */
function GovernanceTab({trail}){
  const d1=useRef(null),d2=useRef(null),d3=useRef(null);
  const ch=useRef({});
  const [rC,setRC]=useState({});
  useEffect(()=>{
    if(!trail.length) return;
    Object.values(ch.current).forEach(c=>c&&c.destroy());ch.current={};
    const aiC={APPROVE:0,FLAG:0,REJECT:0,REFER:0};
    const hC={approve:0,approve_cond:0,override:0,escalate:0,suspend:0};
    const sC={},rCLocal={};
    const aiSysC={};
    trail.forEach(e=>{
      if(aiC[e.aiDecision]!==undefined)aiC[e.aiDecision]++;
      if(hC[e.humanDecision]!==undefined)hC[e.humanDecision]++;
      sC[e.sector]=(sC[e.sector]||0)+1;
      (e.orReasons||[]).forEach(id=>{const l=OVERRIDES.find(r=>r.id===id)?.label||id;rCLocal[l]=(rCLocal[l]||0)+1;});

      if(e.aiSystem)aiSysC[e.aiSystem]=(aiSysC[e.aiSystem]||0)+1;
    });
    const ft={family:'Inter,sans-serif',size:11};
    if(d1.current)ch.current.d1=new Chart(d1.current,{type:'bar',data:{labels:['Approve','Flag','Reject','Refer'],datasets:[{label:'Assessment',data:[aiC.APPROVE,aiC.FLAG,aiC.REJECT,aiC.REFER],backgroundColor:['#DCFCE7','#FEF3C7','#FEE2E2','#DBEAFE'],borderColor:['#16A34A','#D97706','#DC2626','#2563EB'],borderWidth:2,borderRadius:4},{label:'Reviewer',data:[hC.approve,hC.approve_cond,hC.override,hC.escalate],backgroundColor:['rgba(15,23,42,.75)','rgba(15,23,42,.5)','rgba(124,58,237,.7)','rgba(159,18,57,.65)'],borderWidth:0,borderRadius:4},{label:'Suspended',data:[0,0,0,hC.suspend],backgroundColor:['rgba(217,119,6,.6)'],borderWidth:0,borderRadius:4}]},options:{responsive:true,plugins:{legend:{labels:{font:ft}}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:ft}},x:{ticks:{font:ft}}}}});
    if(d2.current)ch.current.d2=new Chart(d2.current,{type:'doughnut',data:{labels:Object.keys(sC),datasets:[{data:Object.values(sC),backgroundColor:['#0f172a','#1FBFD7','#2563EB','#7C3AED','#16A34A','#D97706','#DC2626','#6B7280','#EC4899'],borderWidth:3,borderColor:'#fff'}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:ft,boxWidth:12}}}}});
    setRC({...rCLocal});
    const sr=Object.entries(rCLocal).sort((a,b)=>b[1]-a[1]);
    if(sr.length&&d3.current)ch.current.d3=new Chart(d3.current,{type:'bar',data:{labels:sr.map(([k])=>k),datasets:[{label:'Override Frequency',data:sr.map(([,v])=>v),backgroundColor:'rgba(124,58,237,.65)',borderRadius:4}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1,font:ft}},y:{ticks:{font:ft}}}}});

    return()=>Object.values(ch.current).forEach(c=>c&&c.destroy());
  },[trail]);

  if(!trail.length) return<div className="empty"><div className="ei">📊</div><h3>No data yet</h3><p>Complete your first review to begin building governance intelligence.</p></div>;
  const active=trail.filter(e=>!e.archived);
  const total=active.length||trail.length;
  const ov=trail.filter(e=>e.humanDecision==='override').length;
  const esc=trail.filter(e=>e.humanDecision==='escalate').length;
  const susp=trail.filter(e=>e.humanDecision==='suspend').length;
  const rate=Math.round(((ov+esc+susp)/trail.length)*100);
  const avgS=(trail.reduce((s,e)=>s+parseFloat(e.avgLensScore),0)/total).toFixed(1);
  const lL={};trail.forEach(e=>{(e.lensRatings?Object.entries(e.lensRatings):[]).forEach(([id,r])=>{if(r<=2){const t=LENSES.find(x=>x.id===id)?.title||id;lL[t]=(lL[t]||0)+1;}});});
  const topL=Object.entries(lL).sort((a,b)=>b[1]-a[1])[0];
  return(
    <div className="fade-up">
      <div style={{marginBottom:22}}><h2 style={{fontSize:18,fontWeight:800,color:'var(--primary)'}}>Governance Dashboard</h2><p style={{fontSize:12,color:'var(--muted)',marginTop:3}}>Aggregated oversight metrics across all completed reviews.</p></div>
      <div className="statgrid" style={{gridTemplateColumns:'repeat(5,1fr)'}}>
        {[
          {num:trail.length,lbl:'Total Reviews'},
          {num:`${rate}%`,lbl:'Challenge Rate',sub:`${ov} ov · ${esc} esc · ${susp} susp`,col:rate>30?'var(--reject)':undefined},
          {num:avgS,lbl:'Avg Lens Score',sub:'out of 5.0'},
          {num:susp,lbl:'Suspensions',sub:'pre-action halts',col:susp>0?'var(--flag)':undefined},
          {num:topL?topL[0]:'—',lbl:'Most Flagged Lens',sub:topL?`${topL[1]} low rating${topL[1]>1?'s':''}`:undefined,small:!!topL}
        ].map((s,i)=>(<div key={i} className="stcard"><div className="stnum" style={{color:s.col||'var(--primary)',fontSize:s.small?13:30,paddingTop:s.small?10:0}}>{s.num}</div><div className="stlbl">{s.lbl}</div>{s.sub&&<div className="stsub">{s.sub}</div>}</div>))}
      </div>
      {rate>30&&<div className="alert a-warn"><span>⚠️</span><div><strong>Governance Signal:</strong> Challenge rate of {rate}% exceeds the 30% threshold. This may indicate systematic assessment issues, data quality problems, or miscalibrated thresholds. Review the Override Reasoning chart below.</div></div>}
      <div className="chartgrid">
        <div className="ccard"><div className="clbl">Decision Distribution — Assessment vs Reviewer</div><canvas ref={d1} height={210}/></div>
        <div className="ccard"><div className="clbl">Reviews by Sector</div><canvas ref={d2} height={210}/></div>
        <div className="ccard">
          <div className="clbl">Override Reasoning Intelligence — Category Frequency</div>
          {Object.keys(rC).length>0
            ? <canvas ref={d3} height={160}/>
            : <div style={{textAlign:'center',padding:'32px 20px',color:'var(--muted)'}}>
                <div style={{fontSize:28,marginBottom:10}}>🔄</div>
                <div style={{fontSize:13,fontWeight:600,marginBottom:6}}>No override data yet</div>
                <div style={{fontSize:12,lineHeight:1.6}}>This chart populates when reviewers complete an Override decision and select at least one taxonomy category. It shows which reasons are most commonly given for departing from the AI output.</div>
              </div>
          }
        </div>

      </div>
    </div>
  );
}

        secs--;

        if(secs<=0) clearInterval(countRef.current);
      },1000);
    }, SESSION_TIMEOUT - WARN_AT);
    timeoutRef.current=setTimeout(()=>{
      clearInterval(countRef.current);
      setCountdown(0);
      setTimedOut(true);
      sessionStorage.removeItem('hos_code');
      logEvent('A03',{reason:'timeout'});

  const tabs=[{id:'review',label:'🔍 New Review'},{id:'audit',label:'📋 Audit Trail',count:trail.length},{id:'governance',label:'📊 Governance View'}];

  return(
    <>
      {/* SESSION TIMEOUT OVERLAY */}

        <div className="timeout-overlay">
          <div className="timeout-box">
            <div style={{fontSize:42,marginBottom:16}}>🔒</div>
            <div style={{fontSize:18,fontWeight:800,color:'var(--primary)',marginBottom:8}}>Session Timed Out</div>
            <p style={{fontSize:13,color:'var(--muted)',lineHeight:1.7,marginBottom:20}}>Your session has expired after 15 minutes of inactivity. Please re-enter your access code to continue. Your audit trail data is preserved.</p>
            <button className="btn btn-p" style={{width:'100%'}} onClick={()=>window.location.reload()}>Re-enter Access Code →</button>
          </div>
        </div>
      )}

      {/* INACTIVITY WARNING */}
      {countdown>0&&!timedOut&&(
        <div style={{position:'fixed',bottom:80,right:24,background:'var(--primary)',color:'#fff',padding:'12px 18px',borderRadius:12,fontSize:13,fontWeight:600,zIndex:700,boxShadow:'0 4px 20px rgba(0,0,0,.2)'}}>
          ⏱ Session expires in {countdown}s
          <button onClick={resetTimer} style={{marginLeft:12,background:'var(--turquoise)',border:'none',color:'#fff',padding:'4px 10px',borderRadius:6,cursor:'pointer',fontSize:12,fontWeight:700,fontFamily:'Inter,sans-serif'}}>Stay Active</button>
        </div>
      )}

      {showWelcome&&<div className="mmask"><div className="wbox"><div className="wicon">🔍</div><div className="wtitle">Human Oversight System</div><p className="wbody">Welcome to HOS — CCC's governance accountability instrument for structured human review of AI-enabled decisions. Every case goes through a five-step protocol producing a complete, defensible audit trail. Would you like a short tour before you begin?</p><div className="wbtns"><button className="btn btn-p" onClick={startTour}>Take the Tour ›</button><button className="btn btn-o" onClick={skipWelcome}>Skip — Go Straight In</button></div></div></div>}
      {showTour&&<Walkthrough onClose={()=>setShowTour(false)}/>}
      {toast&&<Toast {...toast}/>}

      <header className="hdr">
        <div className="hdr-brand">
          <div className="hdr-logo" style={{background:'transparent',border:'none',padding:2}}>
            <img src="logo.png" alt="CCC" style={{width:'100%',height:'100%',objectFit:'contain'}}/>
          </div>
          <div><div className="hdr-org">CCC Consultancy Group</div><div className="hdr-tag">UK Expertise · Global Perspective · Local Impact</div></div>
          <div className="hdr-div"/>
          <div><div className="hdr-tool">Human Oversight System</div><div className="hdr-abbr">HOS — Structured review for AI-enabled decisions</div></div>
        </div>
        <div className="hdr-actions"><button className="icon-btn" title="Take the Tour" onClick={()=>setShowTour(true)}>🗺️</button></div>
      </header>

      <nav className="tabs">
        {tabs.map(t=>(<button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>{setTab(t.id);logEvent(t.id==='review'?'T01':t.id==='audit'?'T02':'T03',{from:tab});}}>{t.label}{t.count>0&&<span className="tab-count">{t.count}</span>}</button>))}
      </nav>

      {savedProgress&&tab==='review'&&(
        <div className="resume-bar">
          <div><p>You have an unsaved review in progress — saved at {fmtDate(savedProgress.savedAt)}</p><span>Step {savedProgress.step} of 5 completed</span></div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-o" style={{background:'rgba(255,255,255,.1)',color:'#fff',border:'1px solid rgba(255,255,255,.3)',fontSize:12,padding:'8px 14px'}} onClick={discardProgress}>Dismiss</button>
            <button className="btn btn-t" style={{fontSize:12,padding:'8px 16px'}} onClick={()=>{setSavedProgress(null);showToast('Resuming saved review');logEvent('S02');}}>Resume Review ›</button>
          </div>
        </div>
      )}

      <main style={{flex:1}}><div className="wrap">
        {tab==='review'&&<ReviewTab key={reviewKey} onComplete={onComplete}/>}
        {tab==='audit'&&<AuditTab trail={trail} onUpdate={onUpdateTrail}/>}
        {tab==='governance'&&<GovernanceTab trail={trail}/>}
      </div></main>

      <a className="fbfloat" href="mailto:info@cccconsultancygroup.com?subject=HOS%20Feedback&body=Tool%3A%20Human%20Oversight%20System%0A%0AFeedback%3A%0A" target="_blank" rel="noopener noreferrer">
        <div className="fbdot"/><span>Share Feedback</span>
      </a>

      <footer className="footer">
        <div className="fi2">
          <div className="ftop">
            <div className="fleft">
              <div className="flrow">
                <div className="flbox" style={{background:'transparent',border:'none',padding:2}}>
                  <img src="logo.png" alt="CCC" style={{width:'100%',height:'100%',objectFit:'contain'}}/>
                </div>
                <div><div className="forg">CCC Consultancy Group Ltd</div><div className="ftag">UK expertise. Global perspective. Local impact.</div></div>
              </div>
              <p className="fbody">The Human Oversight System was developed by CCC Consultancy Group as part of our AI governance and regulatory advisory practice. It embeds structured human review directly into AI-enabled decision workflows — turning informal oversight into a measurable, auditable, and regulatorily-defensible process.</p>
              <div className="flinks">
                <a href="https://www.cccconsultancygroup.com" target="_blank" rel="noopener noreferrer">🌐 cccconsultancygroup.com</a>
                <a href="mailto:info@cccconsultancygroup.com">✉️ info@cccconsultancygroup.com</a>
              </div>
