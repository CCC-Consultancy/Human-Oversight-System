<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Human Oversight System | CCC Consultancy Group</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
:root{
  --bg:#f5f6f9;--surface:#fff;--text:#0f172a;--muted:#6b7280;--border:#e5e7eb;
  --primary:hsl(218.18deg 38.06% 21.29%);--primary-hover:hsl(218.18deg 38.06% 29%);
  --turquoise:#1FBFD7;--tq-light:rgba(31,191,215,.1);
  --approve:#16A34A;--approve-bg:#DCFCE7;
  --flag:#D97706;--flag-bg:#FEF3C7;
  --reject:#DC2626;--reject-bg:#FEE2E2;
  --refer:#2563EB;--refer-bg:#DBEAFE;
  --override:#7C3AED;--override-bg:#EDE9FE;
  --r:18px;--rsm:10px;
  --sh:0 8px 28px rgba(16,24,40,.08);--shsm:0 2px 10px rgba(16,24,40,.05);
  --tr:.2s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{margin:0;background:var(--bg);font-family:'Inter',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;opacity:0;transition:opacity .4s ease}
body.loaded{opacity:1}
#root{display:flex;flex-direction:column;min-height:100vh}
input,select,textarea,button{font-family:inherit}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}

@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseDot{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
.fade-up{animation:fadeUp .3s ease both}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:7px}

/* ─── HEADER ─── */
.hdr{background:var(--primary);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;border-bottom:2px solid rgba(255,255,255,.06)}
.hdr-brand{display:flex;align-items:center;gap:12px}
.hdr-logo{width:36px;height:36px;background:var(--turquoise);border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:var(--primary);flex-shrink:0}
.hdr-org{color:#fff;font-size:13px;font-weight:700}
.hdr-tag{color:rgba(255,255,255,.38);font-size:9px;text-transform:uppercase;letter-spacing:1.3px;margin-top:2px}
.hdr-div{width:1px;height:28px;background:rgba(255,255,255,.12)}
.hdr-tool{color:rgba(255,255,255,.9);font-size:13px;font-weight:600}
.hdr-abbr{color:var(--turquoise);font-size:9px;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.hdr-actions{display:flex;gap:6px}
.icon-btn{width:34px;height:34px;border-radius:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:var(--tr)}
.icon-btn:hover{background:rgba(31,191,215,.2);border-color:rgba(31,191,215,.4);color:var(--turquoise)}

/* ─── TABS ─── */
.tabs{background:var(--surface);border-bottom:1px solid var(--border);padding:0 32px;display:flex;overflow-x:auto}
.tab-btn{padding:15px 20px;font-size:13px;font-weight:600;color:var(--muted);cursor:pointer;border:none;border-bottom:3px solid transparent;background:none;transition:var(--tr);display:flex;align-items:center;gap:7px;white-space:nowrap;font-family:'Inter',sans-serif}
.tab-btn.active{color:var(--primary);border-bottom-color:var(--turquoise)}
.tab-btn:hover:not(.active){color:var(--primary)}
.tab-count{background:var(--turquoise);color:#fff;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700}

/* ─── MAIN ─── */
.wrap{flex:1;padding:32px;max-width:960px;width:100%;margin:0 auto}

/* ─── CARD ─── */
.card{background:var(--surface);border-radius:var(--r);padding:28px;box-shadow:var(--sh);margin-bottom:18px}
.card-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.1px;color:var(--turquoise);margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}

/* ─── STEPS ─── */
.steps{background:var(--surface);border-radius:var(--rsm);padding:14px 22px;margin-bottom:26px;box-shadow:var(--shsm);display:flex;align-items:center}
.sn{display:flex;align-items:center;gap:9px}
.sc{width:27px;height:27px;border-radius:50%;font-size:11px;font-weight:700;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .3s}
.sc.p{background:var(--border);color:#9ca3af}.sc.a{background:var(--primary);color:#fff}.sc.d{background:var(--turquoise);color:#fff}
.sl{font-size:11.5px;font-weight:600;white-space:nowrap;transition:color .2s}
.sl.p{color:var(--muted)}.sl.a{color:var(--primary)}.sl.d{color:var(--turquoise)}
.sconn{flex:1;height:1.5px;background:var(--border);margin:0 8px;transition:background .3s}.sconn.d{background:var(--turquoise)}

/* ─── FIELDS ─── */
.fl{display:block;font-size:11px;font-weight:700;color:var(--primary);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.fi{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Inter',sans-serif;font-size:13.5px;color:var(--text);background:var(--surface);outline:none;transition:border-color var(--tr);margin-bottom:18px}
.fi:focus{border-color:var(--turquoise)}
textarea.fi{resize:vertical;min-height:100px;line-height:1.7}

/* ─── BUTTONS ─── */
.btn{padding:11px 24px;border-radius:11px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:var(--tr);border:none}
.btn-p{background:var(--primary);color:#fff}.btn-p:hover{background:var(--primary-hover)}.btn-p:disabled{opacity:.5;cursor:not-allowed}
.btn-o{background:transparent;color:var(--primary);border:1.5px solid var(--border)}.btn-o:hover{border-color:var(--primary)}
.btn-t{background:var(--turquoise);color:#fff}.btn-t:hover{background:#18a8bd}.btn-t:disabled{opacity:.5;cursor:not-allowed}
.btn-row{display:flex;gap:10px;align-items:center;margin-top:6px}

/* ─── OUTPUT ─── */
.dbadge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:20px;font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.otop{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.cfb{display:flex;align-items:center;gap:12px;flex:1;min-width:200px}
.cfn{font-size:26px;font-weight:800;line-height:1}
.cfm{font-size:9.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;margin-bottom:4px}
.cfbar{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.cffill{height:100%;border-radius:3px;background:linear-gradient(to right,var(--turquoise),var(--primary));transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.ai-h{font-size:15px;font-weight:700;color:var(--primary);margin-bottom:8px;line-height:1.4}
.ai-r{font-size:13px;color:#444;line-height:1.75;margin-bottom:18px}
.ai-g{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ai-s{background:var(--bg);border-radius:10px;padding:14px}
.ai-sl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px}
.ai-s p{font-size:13px;line-height:1.65}
.tag{display:inline-block;padding:3px 9px;border-radius:5px;font-size:11.5px;font-weight:500;margin:0 4px 4px 0;border:1px solid}
.tag-r{background:var(--flag-bg);border-color:#FCD34D;color:#92400E}
.tag-g{background:#F3F4F6;border-color:var(--border);color:#374151}
.tag-b{background:var(--refer-bg);border-color:#BFDBFE;color:#1E40AF}

/* ─── ENGINE NOTE ─── */
.eng-note{background:#F8F5FF;border:1px solid #DDD6FE;border-radius:10px;padding:13px 16px;margin-bottom:16px;font-size:12px;color:#4C1D95;line-height:1.65}

/* ─── LENSES ─── */
.lcard{background:var(--bg);border-radius:12px;padding:18px;margin-bottom:12px;border-left:3px solid transparent;transition:border-color .3s}
.lcard.rated{border-left-color:var(--turquoise)}
.lhdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.lt{font-size:13.5px;font-weight:700;color:var(--primary);margin-bottom:3px}
.ld{font-size:11.5px;color:var(--muted);line-height:1.55}
.ls{font-size:11px;font-weight:700;min-width:90px;text-align:right}
.rrow{display:flex;gap:5px;margin-bottom:10px}
.rb{flex:1;padding:8px 4px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface);cursor:pointer;text-align:center;transition:all .18s;font-family:'Inter',sans-serif}
.rb .rn{font-size:15px;font-weight:800;color:var(--muted);display:block}
.rb .rl{font-size:8px;color:var(--muted);text-transform:uppercase;letter-spacing:.2px;display:block;margin-top:1px;line-height:1.3}
.rb:hover:not(.sel){border-color:var(--turquoise)}
.rb.sel{border-color:var(--primary);background:var(--primary)}
.rb.sel .rn,.rb.sel .rl{color:#fff}
.score-row{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:10px;background:var(--bg);margin:16px 0 4px}
.sbig{font-size:34px;font-weight:800;color:var(--primary);line-height:1}
.sbarw{flex:1}.sbar{height:7px;background:var(--border);border-radius:4px;overflow:hidden;margin-bottom:6px}
.sfill{height:100%;border-radius:4px;transition:width .6s ease,background .3s}
.stxt{font-size:12px;font-weight:600}

/* ─── DECISION ─── */
.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
.dopt{padding:16px;border:2px solid var(--border);border-radius:12px;cursor:pointer;background:var(--surface);transition:all .2s}
.dopt:hover{border-color:#9ca3af}.dopt.sel{border-color:var(--primary);background:var(--primary)}
.di{font-size:20px;display:block;margin-bottom:7px}
.dt{font-weight:700;font-size:13px;display:block;margin-bottom:4px;color:var(--primary)}
.dd{font-size:11.5px;line-height:1.45;color:var(--muted)}
.dopt.sel .dt{color:#fff}.dopt.sel .dd{color:rgba(255,255,255,.6)}

/* ─── OVERRIDE ─── */
.orbox{background:#F8F5FF;border:1.5px solid #DDD6FE;border-radius:12px;padding:18px;margin-bottom:14px}
.orlbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--override);margin-bottom:12px}
.orgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:14px}
.orch{padding:10px 12px;border:1.5px solid #DDD6FE;border-radius:8px;cursor:pointer;background:#fff;display:flex;align-items:flex-start;gap:9px;transition:all .18s}
.orch.sel{border-color:var(--override);background:var(--override-bg)}
.orchk{width:15px;height:15px;border-radius:3px;border:2px solid #DDD6FE;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;margin-top:1px;transition:all .18s}
.orch.sel .orchk{background:var(--override);border-color:var(--override);color:#fff}
.orcn{font-size:12px;font-weight:700;color:var(--text)}.orcd{font-size:10px;color:var(--muted);margin-top:2px}

/* ─── SUGGEST ─── */
.sug{border-radius:10px;padding:12px 16px;margin-bottom:16px;font-size:12.5px;border:1px solid}
.sug.good{background:#F0FDF4;border-color:#86EFAC;color:#14532D}
.sug.warn{background:#FFFBEB;border-color:#FCD34D;color:#78350F}
.sug.bad{background:#FFF1F2;border-color:#FECDD3;color:#881337}

/* ─── ALERTS ─── */
.alert{border-radius:10px;padding:13px 16px;margin-bottom:16px;display:flex;gap:10px;font-size:13px;line-height:1.6;border:1px solid}
.a-info{background:var(--tq-light);border-color:rgba(31,191,215,.3);color:var(--primary)}
.a-warn{background:var(--flag-bg);border-color:#FCD34D;color:#78350F}
.a-green{background:var(--approve-bg);border-color:#86EFAC;color:#14532D}

/* ─── PROGRESS SAVE BANNER ─── */
.resume-bar{background:var(--primary);color:#fff;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
.resume-bar p{font-size:13px;font-weight:600}
.resume-bar span{font-size:12px;color:rgba(255,255,255,.65)}

/* ─── AUDIT ─── */
.aitem{background:var(--surface);border-radius:12px;padding:16px 18px;margin-bottom:10px;border-left:4px solid var(--border);box-shadow:var(--shsm);transition:box-shadow .2s}
.aitem:hover{box-shadow:var(--sh)}
.h-approve{border-left-color:var(--approve)}.h-cond{border-left-color:var(--flag)}.h-override{border-left-color:var(--override)}.h-escalate{border-left-color:var(--reject)}
.ameta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.aid{font-size:11px;font-weight:700;color:var(--turquoise);font-family:monospace}
.atime{font-size:11px;color:var(--muted)}
.brow{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
.mb{padding:3px 8px;border-radius:5px;font-size:11px;font-weight:600}
.mb-g{background:#F2F2F2;color:var(--text)}
.mb-approve{background:var(--approve-bg);color:var(--approve)}.mb-flag{background:var(--flag-bg);color:var(--flag)}
.mb-reject{background:var(--reject-bg);color:var(--reject)}.mb-refer{background:var(--refer-bg);color:var(--refer)}
.mb-ov{background:var(--override-bg);color:var(--override)}.mb-cond{background:#FEF9C3;color:#854D0E}.mb-esc{background:#FFE4E6;color:#9F1239}

/* ─── STATS ─── */
.statgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stcard{background:var(--surface);border-radius:var(--rsm);padding:18px;box-shadow:var(--shsm);text-align:center}
.stnum{font-size:30px;font-weight:800;color:var(--primary);line-height:1;margin-bottom:4px}
.stlbl{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;font-weight:700}
.stsub{font-size:11px;color:var(--turquoise);font-weight:600;margin-top:5px}
.chartgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ccard{background:var(--surface);border-radius:var(--rsm);padding:22px;box-shadow:var(--shsm)}
.clbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--primary);margin-bottom:16px}

/* ─── MODAL ─── */
.mmask{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px}
.mbox{background:#fff;border-radius:var(--r);padding:30px;width:100%;max-width:440px;box-shadow:0 24px 60px rgba(15,23,42,.2);animation:fadeUp .25s ease both}
.mhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mtitle{font-size:17px;font-weight:700;color:var(--primary)}
.mclose{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}

/* ─── WELCOME ─── */
.wbox{background:#fff;border-radius:var(--r);padding:36px;width:100%;max-width:480px;box-shadow:0 24px 60px rgba(15,23,42,.25);animation:fadeUp .3s ease both;text-align:center}
.wicon{font-size:44px;margin-bottom:16px}
.wtitle{font-size:22px;font-weight:800;color:var(--primary);margin-bottom:10px}
.wbody{font-size:14px;color:var(--muted);line-height:1.7;margin-bottom:28px;max-width:340px;margin-left:auto;margin-right:auto}
.wbtns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

/* ─── WALKTHROUGH ─── */
.wt-ov{position:fixed;inset:0;background:rgba(15,23,42,.72);z-index:500}
.wt-tip{position:fixed;z-index:600;background:#fff;border-radius:16px;padding:24px 26px;max-width:360px;box-shadow:0 16px 48px rgba(15,23,42,.25);animation:fadeUp .3s ease both}
.wt-num{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--turquoise);margin-bottom:8px}
.wt-tit{font-size:16px;font-weight:800;color:var(--primary);margin-bottom:10px}
.wt-bod{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:20px}
.wt-foot{display:flex;justify-content:space-between;align-items:center}
.wt-dots{display:flex;gap:5px}
.wt-dot{width:6px;height:6px;border-radius:50%;background:var(--border);transition:background .2s}
.wt-dot.on{background:var(--turquoise)}
.wt-nav{display:flex;gap:8px}

/* ─── SUCCESS ─── */
.sw{text-align:center;padding:48px 20px}
.sring{width:68px;height:68px;border-radius:50%;background:#DCFCE7;display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 20px}
.rid{background:var(--bg);border-radius:8px;padding:9px 20px;font-size:12px;font-weight:700;color:var(--primary);display:inline-block;margin:12px 0;font-family:monospace;letter-spacing:.5px}
.rpills{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.rpill{background:var(--bg);border-radius:10px;padding:10px 18px;text-align:center}
.rpl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:700}
.rpv{font-size:14px;font-weight:800;color:var(--primary);margin-top:3px}

/* ─── EMPTY ─── */
.empty{text-align:center;padding:64px 20px}
.ei{font-size:42px;margin-bottom:14px}
.empty h3{font-size:17px;font-weight:700;color:var(--primary);margin-bottom:8px}
.empty p{font-size:13px;color:var(--muted);line-height:1.6}

/* ─── TOAST ─── */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:1000;color:#fff;box-shadow:0 4px 20px rgba(0,0,0,.2);max-width:320px;animation:toastIn .3s ease both;font-family:'Inter',sans-serif}

/* ─── FLOATING FEEDBACK ─── */
.fbfloat{position:fixed;bottom:28px;left:28px;z-index:300;display:flex;align-items:center;gap:9px;background:var(--primary);color:#fff;padding:11px 18px;border-radius:50px;box-shadow:0 4px 20px rgba(10,26,47,.25);cursor:pointer;border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;transition:all .2s;text-decoration:none}
.fbfloat:hover{background:var(--primary-hover);transform:translateY(-2px)}
.fbdot{width:8px;height:8px;border-radius:50%;background:var(--turquoise);animation:pulseDot 2s infinite}

/* ─── CTA FOOTER ─── */
.footer{background:var(--primary);border-top:3px solid var(--turquoise);padding:32px}
.fi2{max-width:960px;margin:0 auto}
.ftop{display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap;margin-bottom:24px}
.fleft{flex:1;min-width:260px}
.flrow{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.flbox{width:34px;height:34px;background:var(--turquoise);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--primary)}
.forg{color:#fff;font-size:13px;font-weight:700}
.ftag{color:rgba(255,255,255,.4);font-size:10px;margin-top:2px;font-style:italic}
.fbody{color:rgba(255,255,255,.55);font-size:12px;line-height:1.75;max-width:440px;margin-bottom:14px}
.flinks{display:flex;gap:18px;flex-wrap:wrap}
.flinks a{color:var(--turquoise);font-size:12px;font-weight:600;text-decoration:none}
.flinks a:hover{text-decoration:underline}
.fright{text-align:right;min-width:220px}
.frhead{color:rgba(255,255,255,.4);font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:700;margin-bottom:8px}
.frbody{color:rgba(255,255,255,.6);font-size:12px;line-height:1.65;margin-bottom:16px;max-width:260px;margin-left:auto}
.frbtn{display:inline-block;background:var(--turquoise);color:#fff;padding:11px 22px;border-radius:10px;font-size:13px;font-weight:700;text-decoration:none;transition:background .2s}
.frbtn:hover{background:#18a8bd}
.fbot{border-top:1px solid rgba(255,255,255,.08);padding-top:18px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}

/* ═══════════════════════════════════════════════════════════════════
   ASSESSMENT ENGINE v2
   ─────────────────────────────────────────────────────────────────
   How it works:
   1. PHRASE SCANNING   — scans for multi-word risk phrases (more
      specific than single keywords, e.g. "structuring behaviour")
   2. SINGLE KEYWORD    — scans remaining text for single-word signals
   3. NEGATION GUARD    — if a risk term is preceded by a negator
      (no, not, without, denies, cleared, not identified, etc.)
      its weight is inverted to avoid false positives
   4. SECTOR BOOSTER    — sector-specific keyword sets that amplify
      certain signals for the relevant industry
   5. JURISDICTION FLAG — detects Nigeria / CBN / UK / FCA etc. to
      select the right regulatory references
   6. SCORE → DECISION  — net score maps to outcome; confidence is
      calibrated by keyword density and score magnitude
   7. CONTENT ASSEMBLY  — outcome, sector, and decision-type drive
      selection from curated content libraries (rationale blocks,
      risk flags, recommended actions, data gaps, regulatory refs)
   ─────────────────────────────────────────────────────────────────
   Defensibility note shown to user: the engine output is a
   structured starting point for human review, not a regulatory
   determination. The five-lens protocol, override taxonomy and
   audit trail are the defensible layer.
═══════════════════════════════════════════════════════════════════ */

function pickN(arr, n){return [...arr].sort(()=>Math.random()-.5).slice(0,Math.min(n,arr.length));}

function detectNegation(text, phrase){
  const idx = text.indexOf(phrase);
  if(idx<0) return false;
  const before = text.substring(Math.max(0,idx-40),idx).toLowerCase();
  return NEGATORS.some(n=>before.includes(n));
}

function detectJurisdiction(text){
  const t=text.toLowerCase();
  const scores={};
  Object.entries(JURISDICTIONS).forEach(([jur,terms])=>{
    scores[jur]=terms.filter(t2=>t.includes(t2.toLowerCase())).length;
  });
  return Object.entries(scores).sort((a,b)=>b[1]-a[1])[0][0];
}

function runEngine(sector, dtype, scenario){
  const t = scenario.toLowerCase();
  let score=0, phrasesFound=[], positiveFound=[];

  // PHRASE SCANNING with negation check
  PHRASES_HIGH.forEach(ph=>{
    if(t.includes(ph)){
      if(detectNegation(t,ph)){ score+=1; positiveFound.push(ph+' (negated)'); }
      else { score+=3; phrasesFound.push(ph); }
    }
  });
  PHRASES_MED.forEach(ph=>{
    if(t.includes(ph)){
      if(detectNegation(t,ph)) score-=0.5;
      else score+=1;
    }
  });
  PHRASES_LOW.forEach(ph=>{
    if(t.includes(ph)){
      if(detectNegation(t,ph)) score+=1.5;
      else score-=2;
    }
  });

  // SECTOR BOOSTER
  const sb = SECTOR_BOOSTERS[sector];
  if(sb){
    (sb.high||[]).forEach(p=>{ if(t.includes(p.toLowerCase())) score+=2; });
    (sb.low||[]).forEach(p=>{ if(t.includes(p.toLowerCase())) score-=1.5; });
  }

  // DECISION MAPPING
  let decision, conf;
  if(score>=9)      { decision='REJECT'; conf=clamp(75+Math.floor(score)+rand(8),75,97); }
  else if(score>=5) { decision='REJECT'; conf=clamp(62+Math.floor(score)+rand(10),62,88); }
  else if(score>=2) { decision='FLAG';   conf=clamp(55+Math.floor(score*2)+rand(10),55,85); }
  else if(score>=0) { decision=['FLAG','REFER'][Math.floor(Math.random()*2)]; conf=clamp(48+rand(18),48,75); }
  else if(score>=-3){ decision='APPROVE'; conf=clamp(55+Math.abs(score)*3+rand(10),55,82); }
  else              { decision='APPROVE'; conf=clamp(72+Math.abs(score)+rand(10),72,95); }

  const tier = conf>=75?'h':conf>=55?'m':'l';

  // JURISDICTION
  const jur = detectJurisdiction(scenario);

  // CONTENT ASSEMBLY
  const sLabel = sector||'regulated sector';
  const dLabel = dtype||'compliance decision';

  const summaryMap={
    APPROVE:`Assessment outcome: Approve. The ${dLabel} scenario for this ${sLabel} entity has been assessed and presents a risk profile within acceptable parameters for this context.`,
    FLAG:`Assessment outcome: Flag for review. The ${dLabel} scenario contains risk indicators that require structured human review before a final determination is made.`,
    REJECT:`Assessment outcome: Reject. The ${dLabel} scenario presents a risk profile that exceeds acceptable thresholds for this ${sLabel} context.`,
    REFER:`Assessment outcome: Refer for specialist review. The ${dLabel} scenario requires senior-level or specialist assessment before a determination can be finalised.`,
  };

  const sectorFlags = FLAGS_BY_SECTOR[sector] || GENERIC_FLAGS;
  const dtypeFlags  = FLAGS_BY_DTYPE[dtype]   || [];
  const riskFlags   = pickN([...dtypeFlags,...sectorFlags,...GENERIC_FLAGS.slice(0,3)], 4);

  const actionKey = dtype||'generic';
  const action = (ACTIONS[decision]||{})[actionKey] || ACTIONS[decision].generic;

  const dataGaps = pickN(DATA_GAPS[dtype] || ['Further documentation required','Additional verification needed','Supplementary evidence required','Supporting analysis not available'], 3);

  const sectorRegs  = REGS_BY_SECTOR[sector] || [];
  const dtypeRegs   = REGS_BY_DTYPE[dtype]   || [];
  const jurRegs     = jur==='nigeria' ? REGS_BY_SECTOR.nigeria : jur==='eu' ? ['EBA Guidelines','ESMA Guidance','MiFID II'] : [];
  const allRegs     = [...new Set([...dtypeRegs.slice(0,2),...sectorRegs.slice(0,2),...jurRegs.slice(0,1)])];
  const regRefs     = pickN(allRegs.length ? allRegs : REGS_BY_SECTOR.generic, 3);

  return {
    decision, confidence:conf,
    summary: summaryMap[decision],
    rationale: RATIONALE[decision][tier],
    risk_flags: riskFlags,
    recommended_action: action,
    data_gaps: dataGaps,
    regulatory_references: regRefs,
    _debug: {score: score.toFixed(2), tier, jurisdiction:jur}
  };
}

function clamp(v,min,max){return Math.min(max,Math.max(min,v));}
function rand(n){return Math.floor(Math.random()*n);}

/* ═══ STEP 1 ═══ */
function Step1({onNext,savedData}){
  const [sector,setSector]=useState(savedData?.sector||'');
  const [sectorCustom,setSectorCustom]=useState(savedData?.sectorCustom||'');
  const [dtype,setDtype]=useState(savedData?.dtype||'');
  const [dtypeCustom,setDtypeCustom]=useState(savedData?.dtypeCustom||'');
  const [scenario,setScenario]=useState(savedData?.scenario||'');
  const [reviewer,setReviewer]=useState(savedData?.reviewer||localStorage.getItem('hos_reviewer')||'');
  const [orgName,setOrgName]=useState(savedData?.orgName||localStorage.getItem('hos_org')||'');
  const [loading,setLoading]=useState(false);
  const [toast,setToast]=useState(null);
  function showToast(msg,type='error'){setToast({msg,type});setTimeout(()=>setToast(null),3200);}

  const effectiveSector = sector==='other'?(sectorCustom.trim()||'other sector'):sector;
  const effectiveDtype  = dtype==='other'?(dtypeCustom.trim()||'decision'):dtype;

  function generate(){
    if(!sector) return showToast('Please select a sector');
    if(sector==='other'&&!sectorCustom.trim()) return showToast('Please specify your sector');
    if(!scenario.trim()) return showToast('Please describe the scenario');
    setLoading(true);
    if(reviewer) localStorage.setItem('hos_reviewer',reviewer);
    if(orgName) localStorage.setItem('hos_org',orgName);
    setTimeout(()=>{
      const result=runEngine(effectiveSector,effectiveDtype,scenario);
      onNext({result,sector:effectiveSector,sectorCustom,dtype:effectiveDtype,dtypeCustom,scenario:scenario.substring(0,400),reviewer:reviewer||'Anonymous',orgName:orgName||''});

  return(

          </div>

          </div>

        <textarea className="fi" style={{minHeight:120,marginBottom:16}} placeholder="Paste or describe the decision scenario here. Include as much relevant detail as possible — the assessment engine uses the content of your description to determine risk signals, regulatory flags, and the appropriate outcome. e.g. The system flagged a £240,000 loan application from a logistics SME. Director changes in the past 3 months. Clean credit history. No adverse media. One compliance note from 2023 — unresolved..." value={scenario} onChange={e=>setScenario(e.target.value)}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          <div><label className="fl">Organisation Name</label><input className="fi" type="text" placeholder="e.g. Aethis Limited" value={orgName} onChange={e=>setOrgName(e.target.value)}/></div>

/* ═══ STEP 2 ═══ */

/* ═══ STEP 3 ═══ */
function Step3({onNext,onBack,saved}){
  const [ratings,setRatings]=useState(saved?.ratings||{});
  const [notes,setNotes]=useState(saved?.notes||{});
  const vals=Object.values(ratings),allRated=vals.length===LENSES.length,avg=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  const sc=avg<2.5?'var(--reject)':avg<3.5?'var(--flag)':'var(--approve)';
  const vt=avg<2.5?'Significant concerns — Override or Escalation recommended':avg<3.5?'Moderate concerns — Approve with Conditions may be appropriate':'Review supports the output — Approval is appropriate';
  return(
    <div className="fade-up">
      <div className="card">
        <div className="card-lbl">Structured Review Protocol — Five-Lens Assessment</div>
        <p style={{fontSize:12.5,color:'var(--muted)',marginBottom:20,lineHeight:1.65}}>Rate each analytical lens from 1 (Major Concern) to 5 (Strong). Your scores drive the system recommendation on the next step. All five lenses must be rated.</p>
        {LENSES.map(l=>{const r=ratings[l.id],lc=r?(r<=2?'var(--reject)':r===3?'var(--flag)':'var(--approve)'):'var(--muted)';return(
          <div key={l.id} className={`lcard ${r?'rated':''}`}>
            <div className="lhdr"><div><div className="lt">{l.icon} {l.title}</div><div className="ld">{l.desc}</div></div><div className="ls" style={{color:lc}}>{r?R_LABELS[r]:'Not rated'}</div></div>
            <div className="rrow">{[1,2,3,4,5].map(n=>(<button key={n} className={`rb ${ratings[l.id]===n?'sel':''}`} onClick={()=>setRatings(p=>({...p,[l.id]:n}))}><span className="rn">{n}</span><span className="rl">{R_LABELS[n]}</span></button>))}</div>
            <textarea className="fi" style={{minHeight:44,fontSize:12,padding:'8px 12px',marginBottom:0}} placeholder="Optional note for this dimension..." value={notes[l.id]||''} onChange={e=>setNotes(p=>({...p,[l.id]:e.target.value}))}/>
          </div>
        );})}
        {vals.length>0&&<div className="score-row"><div><div className="sbig">{avg.toFixed(1)}</div><div style={{fontSize:10,color:'var(--muted)',fontWeight:700,textTransform:'uppercase',letterSpacing:'.5px',marginTop:3}}>Avg Score</div></div><div className="sbarw"><div className="sbar"><div className="sfill" style={{width:`${(avg/5)*100}%`,background:sc}}/></div><div className="stxt" style={{color:sc}}>{vt}</div></div></div>}
      </div>
      <div className="btn-row"><button className="btn btn-o" onClick={onBack}>← Back</button><button className="btn btn-p" style={{opacity:allRated?1:.5,cursor:allRated?'pointer':'not-allowed'}} onClick={()=>allRated&&onNext({ratings,notes,avg:avg.toFixed(2)})} disabled={!allRated}>Proceed to Decision ›</button></div>
    </div>
  );
}

/* ═══ STEP 4 ═══ */
function Step4({avgScore,onNext,onBack,saved}){
  const [decision,setDecision]=useState(saved?.decision||null);
  const [orR,setOrR]=useState(saved?.orR||[]);
  const [orN,setOrN]=useState(saved?.orN||'');
  const [cN,setCN]=useState(saved?.cN||'');
  const avg=parseFloat(avgScore),sCls=avg<2.5?'bad':avg<3.5?'warn':'good';
  const sTxt=avg<2.5?`System Recommendation: Lens scores indicate significant concerns (avg ${avg.toFixed(1)}/5). Override or Escalation is recommended.`:avg<3.5?`System Recommendation: Lens scores indicate moderate concerns (avg ${avg.toFixed(1)}/5). Approval with Conditions is appropriate.`:`System Recommendation: Lens scores support the output (avg ${avg.toFixed(1)}/5). Approval appears appropriate.`;
  const toggleOR=id=>setOrR(r=>r.includes(id)?r.filter(x=>x!==id):[...r,id]);
  const showOr=decision==='override'||decision==='escalate';
  return(
    <div className="fade-up">
      <div className="card">
        <div className="card-lbl">Reviewer Decision</div>
        <div className={`sug ${sCls}`}>💡 {sTxt}</div>
        <div className="dgrid">{H_OPTIONS.map(d=>(<div key={d.id} className={`dopt ${decision===d.id?'sel':''}`} onClick={()=>setDecision(d.id)}><span className="di">{d.icon}</span><span className="dt">{d.title}</span><span className="dd">{d.desc}</span></div>))}</div>
        {showOr&&<div className="orbox"><div className="orlbl">🔍 Override Reasoning Taxonomy — select all that apply</div><div className="orgrid">{OVERRIDES.map(r=>{const sel=orR.includes(r.id);return(<div key={r.id} className={`orch ${sel?'sel':''}`} onClick={()=>toggleOR(r.id)}><div className="orchk">{sel&&'✓'}</div><div><div className="orcn">{r.label}</div><div className="orcd">{r.desc}</div></div></div>);})}</div><label className="fl">Documentation &amp; Notes</label><textarea className="fi" style={{minHeight:90,marginBottom:0}} placeholder="Document your reasoning for the override or escalation. This forms part of the regulatory audit trail and should be sufficiently detailed to be defensible under regulatory scrutiny..." value={orN} onChange={e=>setOrN(e.target.value)}/></div>}
        {decision==='approve_cond'&&<div><label className="fl">Conditions &amp; Caveats</label><textarea className="fi" style={{minHeight:90,marginBottom:0}} placeholder="Document the conditions, monitoring requirements, or additional controls applied to this conditional approval..." value={cN} onChange={e=>setCN(e.target.value)}/></div>}
      </div>
      <div className="btn-row"><button className="btn btn-o" onClick={onBack}>← Back</button><button className="btn btn-t" style={{opacity:decision?1:.5,cursor:decision?'pointer':'not-allowed'}} onClick={()=>decision&&onNext({decision,orR,orN,cN})} disabled={!decision}>Submit &amp; Record Review ›</button></div>
    </div>
  );
}

      <p style={{fontSize:13,color:'var(--muted)',marginBottom:6}}>This review has been recorded to the audit trail.</p>

      <div className="rpills">{[['Assessment Outcome',entry.aiDecision],['Reviewer Decision',H_LABELS[entry.humanDecision]],['Review Score',`${entry.avgLensScore} / 5.0`],['Sector',entry.sector]].map(([l,v])=>(<div key={l} className="rpill"><div className="rpl">{l}</div><div className="rpv">{v}</div></div>))}</div>

/* ═══ REVIEW FLOW ═══ */
function ReviewTab({onComplete}){
  const [step,setStep]=useState(1);
  const [data,setData]=useState({});

  // Auto-save on every data change
  useEffect(()=>{
    if(step>1&&Object.keys(data).length>0){
      localStorage.setItem(SAVE_KEY,JSON.stringify({step,data,savedAt:new Date().toISOString()}));
    }
  },[step,data]);

  function go(n){setStep(n);window.scrollTo({top:0,behavior:'smooth'});}
  function handleS1(d){const nd={...data,...d};setData(nd);go(2);}
  function handleS3(d){const nd={...data,lens:d};setData(nd);go(4);}
  function handleS4(d){
    const entry={id:genId(),timestamp:new Date().toISOString(),sector:data.sector,sectorCustom:data.sectorCustom||'',dtype:data.dtype,dtypeCustom:data.dtypeCustom||'',scenario:data.scenario,reviewer:data.reviewer,orgName:data.orgName,aiDecision:data.result.decision,aiConfidence:data.result.confidence,aiSummary:data.result.summary,aiRiskFlags:data.result.risk_flags,avgLensScore:data.lens.avg,lensRatings:data.lens.ratings,lensNotes:data.lens.notes,humanDecision:d.decision,orReasons:d.orR,orNotes:d.orN,condNotes:d.cN};
    setData(p=>({...p,entry}));onComplete(entry);
    localStorage.removeItem(SAVE_KEY);// clear saved progress
    go(5);
  }
  function reset(){setStep(1);setData({});localStorage.removeItem(SAVE_KEY);}

  return(<div>
    <StepsBar step={step}/>
    {step===1&&<Step1 onNext={handleS1} savedData={data}/>}
    {step===2&&<Step2 result={data.result} onNext={()=>go(3)} onBack={()=>go(1)}/>}
    {step===3&&<Step3 onNext={handleS3} onBack={()=>go(2)} saved={data.lens}/>}
    {step===4&&<Step4 avgScore={data.lens?.avg||3} onNext={handleS4} onBack={()=>go(3)} saved={data.step4}/>}
    {step===5&&<Step5 entry={data.entry} onNew={reset}/>}
  </div>);
}

/* ═══ AUDIT TAB ═══ */
function AuditTab({trail,onClear}){
  function exportCSV(){
    const h=['Review ID','Timestamp','Reviewer','Organisation','Sector','Decision Type','Assessment Outcome','Confidence %','Reviewer Decision','Avg Lens Score','Override Reasons','Notes','Summary'];
    const r=trail.map(e=>[e.id,e.timestamp,e.reviewer,e.orgName,e.sector,e.dtype,e.aiDecision,e.aiConfidence,H_LABELS[e.humanDecision]||e.humanDecision,e.avgLensScore,(e.orReasons||[]).map(id=>OVERRIDES.find(r=>r.id===id)?.label||id).join('; '),e.orNotes||e.condNotes||'',e.aiSummary||'']);
    const csv=[h,...r].map(rw=>rw.map(c=>`"${String(c||'').replace(/"/g,'""')}"`).join(',')).join('\n');
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=`hos-audit-${new Date().toISOString().slice(0,10)}.csv`;a.click();
  }
  const hlC={approve:'h-approve',approve_cond:'h-cond',override:'h-override',escalate:'h-escalate'};
  const aiB={APPROVE:'mb-approve',FLAG:'mb-flag',REJECT:'mb-reject',REFER:'mb-refer'};
  const hB={approve:'mb-approve',approve_cond:'mb-cond',override:'mb-ov',escalate:'mb-esc'};
  return(
    <div className="fade-up">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:22,flexWrap:'wrap',gap:12}}>
        <div><h2 style={{fontSize:18,fontWeight:800,color:'var(--primary)'}}>Audit Trail</h2><p style={{fontSize:12,color:'var(--muted)',marginTop:3}}>All completed reviews — timestamped, structured, and exportable for regulatory evidence.</p></div>
        <div style={{display:'flex',gap:8}}>
          <button className="btn btn-o" style={{fontSize:12,padding:'8px 14px'}} onClick={exportCSV}>⬇ Export CSV</button>
          <button className="btn btn-o" style={{fontSize:12,padding:'8px 14px',color:'var(--reject)'}} onClick={()=>confirm('Clear all audit trail data?')&&onClear()}>🗑 Clear All</button>
        </div>
      </div>
      {!trail.length?<div className="empty"><div className="ei">📋</div><h3>No reviews yet</h3><p>Completed reviews will appear here with full audit detail,<br/>timestamps, and exportable evidence.</p></div>:
      trail.map(e=>{const orL=(e.orReasons||[]).map(id=>OVERRIDES.find(r=>r.id===id)?.label).filter(Boolean);return(
        <div key={e.id} className={`aitem ${hlC[e.humanDecision]||''}`}>
          <div className="ameta"><span className="aid">{e.id}</span><span className="atime">{fmtDate(e.timestamp)}</span></div>
          <div className="brow">
            <span className="mb mb-g">{e.sector}</span>
            <span className={`mb ${aiB[e.aiDecision]||'mb-g'}`}>Assessment: {e.aiDecision} ({e.aiConfidence}%)</span>
            <span className={`mb ${hB[e.humanDecision]||'mb-g'}`}>Reviewer: {H_LABELS[e.humanDecision]||e.humanDecision}</span>
            {e.reviewer!=='Anonymous'&&<span className="mb mb-g">👤 {e.reviewer}</span>}
            {e.orgName&&<span className="mb mb-g">🏢 {e.orgName}</span>}
            <span className="mb mb-g">Score: {e.avgLensScore}/5</span>
          </div>
          <div style={{fontSize:13,color:'var(--text)',lineHeight:1.55}}>{e.aiSummary}</div>
          {orL.length>0&&<div style={{fontSize:11.5,color:'var(--muted)',marginTop:6,fontStyle:'italic'}}>Override reasons: {orL.join(' · ')}</div>}
          {(e.orNotes||e.condNotes)&&<div style={{fontSize:11.5,color:'var(--muted)',marginTop:4,fontStyle:'italic'}}>"{e.orNotes||e.condNotes}"</div>}
        </div>
      );})}
    </div>
  );
}

/* ═══ GOVERNANCE TAB ═══ */
function GovernanceTab({trail}){
  const d1=useRef(null),d2=useRef(null),d3=useRef(null);
  const ch=useRef({});
  useEffect(()=>{
    if(!trail.length) return;
    Object.values(ch.current).forEach(c=>c&&c.destroy());ch.current={};
    const aiC={APPROVE:0,FLAG:0,REJECT:0,REFER:0},hC={approve:0,approve_cond:0,override:0,escalate:0},sC={},rC={};
    trail.forEach(e=>{if(aiC[e.aiDecision]!==undefined)aiC[e.aiDecision]++;if(hC[e.humanDecision]!==undefined)hC[e.humanDecision]++;sC[e.sector]=(sC[e.sector]||0)+1;(e.orReasons||[]).forEach(id=>{const l=OVERRIDES.find(r=>r.id===id)?.label||id;rC[l]=(rC[l]||0)+1;});});
    const ft={family:'Inter,sans-serif',size:11};
    if(d1.current)ch.current.d1=new Chart(d1.current,{type:'bar',data:{labels:['Approve','Flag','Reject','Refer'],datasets:[{label:'Assessment',data:[aiC.APPROVE,aiC.FLAG,aiC.REJECT,aiC.REFER],backgroundColor:['#DCFCE7','#FEF3C7','#FEE2E2','#DBEAFE'],borderColor:['#16A34A','#D97706','#DC2626','#2563EB'],borderWidth:2,borderRadius:4},{label:'Reviewer',data:[hC.approve,hC.approve_cond,hC.override,hC.escalate],backgroundColor:['rgba(15,23,42,.75)','rgba(15,23,42,.5)','rgba(124,58,237,.7)','rgba(220,38,38,.65)'],borderWidth:0,borderRadius:4}]},options:{responsive:true,plugins:{legend:{labels:{font:ft}}},scales:{y:{beginAtZero:true,ticks:{stepSize:1,font:ft}},x:{ticks:{font:ft}}}}});
    if(d2.current)ch.current.d2=new Chart(d2.current,{type:'doughnut',data:{labels:Object.keys(sC),datasets:[{data:Object.values(sC),backgroundColor:['#0f172a','#1FBFD7','#2563EB','#7C3AED','#16A34A','#D97706','#DC2626','#6B7280','#EC4899'],borderWidth:3,borderColor:'#fff'}]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{font:ft,boxWidth:12}}}}});
    const sr=Object.entries(rC).sort((a,b)=>b[1]-a[1]);
    if(sr.length&&d3.current)ch.current.d3=new Chart(d3.current,{type:'bar',data:{labels:sr.map(([k])=>k),datasets:[{label:'Override Frequency',data:sr.map(([,v])=>v),backgroundColor:'rgba(124,58,237,.65)',borderRadius:4}]},options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},scales:{x:{beginAtZero:true,ticks:{stepSize:1,font:ft}},y:{ticks:{font:ft}}}}});
    return()=>Object.values(ch.current).forEach(c=>c&&c.destroy());
  },[trail]);

  if(!trail.length) return<div className="empty"><div className="ei">📊</div><h3>No data yet</h3><p>Complete your first review to begin building governance intelligence.</p></div>;

  const total=trail.length,ov=trail.filter(e=>e.humanDecision==='override').length,esc=trail.filter(e=>e.humanDecision==='escalate').length;
  const rate=Math.round(((ov+esc)/total)*100);
  const avgS=(trail.reduce((s,e)=>s+parseFloat(e.avgLensScore),0)/total).toFixed(1);
  const lL={};trail.forEach(e=>{(e.lensRatings?Object.entries(e.lensRatings):[]).forEach(([id,r])=>{if(r<=2){const t=LENSES.find(x=>x.id===id)?.title||id;lL[t]=(lL[t]||0)+1;}});});
  const topL=Object.entries(lL).sort((a,b)=>b[1]-a[1])[0];

  return(
    <div className="fade-up">
      <div style={{marginBottom:22}}><h2 style={{fontSize:18,fontWeight:800,color:'var(--primary)'}}>Governance Dashboard</h2><p style={{fontSize:12,color:'var(--muted)',marginTop:3}}>Aggregated oversight metrics across all completed reviews.</p></div>
      <div className="statgrid">
        {[{num:total,lbl:'Total Reviews'},{num:`${rate}%`,lbl:'Challenge Rate',sub:`${ov} overrides · ${esc} escalations`,col:rate>30?'var(--reject)':undefined},{num:avgS,lbl:'Avg Review Score',sub:'out of 5.0'},{num:topL?topL[0]:'—',lbl:'Most Flagged Lens',sub:topL?`${topL[1]} low rating${topL[1]>1?'s':''}`:undefined,small:!!topL}].map((s,i)=>(<div key={i} className="stcard"><div className="stnum" style={{color:s.col||'var(--primary)',fontSize:s.small?13:30,paddingTop:s.small?10:0}}>{s.num}</div><div className="stlbl">{s.lbl}</div>{s.sub&&<div className="stsub">{s.sub}</div>}</div>))}
      </div>
      {rate>30&&<div className="alert a-warn"><span>⚠️</span><div><strong>Governance Signal:</strong> Challenge rate of {rate}% exceeds the 30% threshold. This may indicate systematic assessment issues, data quality problems, or miscalibrated thresholds. Review the Override Reasoning chart below.</div></div>}
      <div className="chartgrid">
        <div className="ccard"><div className="clbl">Decision Distribution — Assessment vs Reviewer</div><canvas ref={d1} height={210}/></div>
        <div className="ccard"><div className="clbl">Reviews by Sector</div><canvas ref={d2} height={210}/></div>
        <div className="ccard" style={{gridColumn:'1 / -1'}}><div className="clbl">Override Reasoning Intelligence — Category Frequency</div><canvas ref={d3} height={130}/></div>
      </div>
    </div>
  );
}

/* ═══ APP ═══ */
function App(){
  const [tab,setTab]=useState('review');
  const [trail,setTrail]=useState(()=>{try{return JSON.parse(localStorage.getItem('hos_trail')||'[]');}catch{return [];}});
  const [toast,setToast]=useState(null);
  const [showWelcome,setShowWelcome]=useState(false);
  const [showTour,setShowTour]=useState(false);
  const [savedProgress,setSavedProgress]=useState(null);
  const [reviewKey,setReviewKey]=useState(0);// force remount to load saved data

  useEffect(()=>{
    const seen=localStorage.getItem('hos_seen');
    const saved=localStorage.getItem(SAVE_KEY);
    if(saved){
      try{const p=JSON.parse(saved);setSavedProgress(p);}catch{}
    }
    if(!seen) setShowWelcome(true);
  },[]);

  function showToast(msg,type='success'){setToast({msg,type});setTimeout(()=>setToast(null),3200);}
  function onComplete(entry){const next=[entry,...trail];setTrail(next);localStorage.setItem('hos_trail',JSON.stringify(next));showToast('Review recorded — '+entry.id);}
  function clearTrail(){setTrail([]);localStorage.removeItem('hos_trail');}
  function startTour(){localStorage.setItem('hos_seen','1');setShowWelcome(false);setShowTour(true);}
  function skipWelcome(){localStorage.setItem('hos_seen','1');setShowWelcome(false);}
  function discardProgress(){localStorage.removeItem(SAVE_KEY);setSavedProgress(null);}

  const tabs=[{id:'review',label:'🔍 New Review'},{id:'audit',label:'📋 Audit Trail',count:trail.length},{id:'governance',label:'📊 Governance View'}];

  return(
    <>
      {showWelcome&&<div className="mmask"><div className="wbox"><div className="wicon">🔍</div><div className="wtitle">Human Oversight System</div><p className="wbody">Welcome to HOS — CCC's structured review tool for AI-enabled decisions. Every case goes through a five-step protocol that produces a complete, defensible audit trail. Would you like a short tour before you begin?</p><div className="wbtns"><button className="btn btn-p" onClick={startTour}>Take the Tour ›</button><button className="btn btn-o" onClick={skipWelcome}>Skip — Go Straight In</button></div></div></div>}
      {showTour&&<Walkthrough onClose={()=>setShowTour(false)}/>}
      {toast&&<Toast {...toast}/>}

      <header className="hdr">
        <div className="hdr-brand">
          <div className="hdr-logo">CCC</div>
          <div><div className="hdr-org">CCC Consultancy Group</div><div className="hdr-tag">UK Expertise · Global Perspective · Local Impact</div></div>
          <div className="hdr-div"/>
          <div><div className="hdr-tool">Human Oversight System</div><div className="hdr-abbr">HOS — Structured review for AI-enabled decisions</div></div>
        </div>
        <div className="hdr-actions"><button className="icon-btn" title="Take the Tour" onClick={()=>setShowTour(true)}>🗺️</button></div>
      </header>

      <nav className="tabs">
        {tabs.map(t=>(<button key={t.id} className={`tab-btn ${tab===t.id?'active':''}`} onClick={()=>setTab(t.id)}>{t.label}{t.count>0&&<span className="tab-count">{t.count}</span>}</button>))}
      </nav>

      {savedProgress&&tab==='review'&&(
        <div className="resume-bar">
          <div><p>You have an unsaved review in progress — saved at {fmtDate(savedProgress.savedAt)}</p><span>Step {savedProgress.step} of 5 completed</span></div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-o" style={{background:'rgba(255,255,255,.1)',color:'#fff',border:'1px solid rgba(255,255,255,.3)',fontSize:12,padding:'8px 14px'}} onClick={()=>{/* resume logic via key */setSavedProgress(null);}}>Dismiss</button>
            <button className="btn btn-t" style={{fontSize:12,padding:'8px 16px'}} onClick={()=>{setSavedProgress(null);showToast('Resuming saved review — scroll down to continue');}}>Resume Review ›</button>
          </div>
        </div>
      )}

      <main style={{flex:1}}><div className="wrap">
        {tab==='review'&&<ReviewTab key={reviewKey} onComplete={onComplete}/>}
        {tab==='audit'&&<AuditTab trail={trail} onClear={clearTrail}/>}
        {tab==='governance'&&<GovernanceTab trail={trail}/>}
      </div></main>

      <a className="fbfloat" href="mailto:info@cccconsultancygroup.com?subject=HOS%20Feedback&body=Tool%3A%20Human%20Oversight%20System%0A%0AFeedback%3A%0A" target="_blank" rel="noopener noreferrer">
        <div className="fbdot"/><span>Share Feedback</span>
      </a>

      <footer className="footer">
        <div className="fi2">
          <div className="ftop">
            <div className="fleft">
              <div className="flrow"><div className="flbox">CCC</div><div><div className="forg">CCC Consultancy Group Ltd</div><div className="ftag">UK expertise. Global perspective. Local impact.</div></div></div>
              <p className="fbody">The Human Oversight System was developed by CCC Consultancy Group as part of our AI governance and regulatory advisory practice. It embeds structured human review directly into AI-enabled decision workflows — turning informal oversight into a measurable, auditable, and regulatorily-defensible process.</p>
              <div className="flinks">
                <a href="https://www.cccconsultancygroup.com" target="_blank" rel="noopener noreferrer">🌐 cccconsultancygroup.com</a>
                <a href="mailto:info@cccconsultancygroup.com">✉️ info@cccconsultancygroup.com</a>
              </div>
            </div>
            <div className="fright">
              <div className="frhead">Advisory Support</div>
              <p className="frbody">Need support implementing AI oversight frameworks, governance design, or regulatory compliance in your organisation?</p>
              <a href="https://www.cccconsultancygroup.com" target="_blank" rel="noopener noreferrer" className="frbtn">Book a Consultation ›</a>
            </div>
          </div>
          <div className="fbot">
            <span className="fcopy">© 2026 CCC Consultancy Group Ltd. All rights reserved.</span>
            <span className="fslogan">UK expertise. Global perspective. Local impact.</span>
          </div>
        </div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
<script>window.addEventListener('DOMContentLoaded',()=>document.body.classList.add('loaded'));</script>
</body>
